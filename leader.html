
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Топ лидеров PD</title>
  <link rel="icon" type="image/png" href="favicon1.ico">
  <link rel="apple-touch-icon" href="favicon1.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root{
      --text:#f3f6ff;

      --accent1:#ff2d7a;
      --accent2:#2ef9ff;
      --accent3:#a855f7;
      --accent4:#ff4d5e;

      --bg0:#06070f;

      --glass: rgba(8, 10, 24, .55);
      --glass2: rgba(0,0,0,.22);

      --b1: rgba(255,255,255,.10);
      --b2: rgba(255,255,255,.16);
      --ring: rgba(46,249,255,.42);

      --shadow-s: 0 10px 32px rgba(0,0,0,.28);
      --shadow-m: 0 18px 64px rgba(0,0,0,.44);
      --shadow-l: 0 28px 96px rgba(0,0,0,.62);

      --rXL: 30px;
      --rL: 24px;

      --ease: cubic-bezier(.2,.9,.1,1);
      --ease2: cubic-bezier(.16,1,.3,1);

      --dur-quick: 240ms;
      --dur: 520ms;
      --dur-slow: 820ms;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html{ scroll-behavior: smooth; }

    body{
      min-height:100vh;
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:22px;
      overflow-x:hidden;
      background: url("fon.png") center / cover no-repeat fixed;
      background-color: var(--bg0);
      position:relative;
      filter: none;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-5;
      background:
        radial-gradient(1200px 560px at 50% 0%, rgba(168,85,247,.22), transparent 62%),
        radial-gradient(900px 520px at 12% 12%, rgba(255,45,122,.18), transparent 58%),
        radial-gradient(900px 520px at 88% 18%, rgba(46,249,255,.14), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,.54) 0%, rgba(0,0,0,.30) 45%, rgba(0,0,0,.68) 100%);
      mix-blend-mode: normal;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-4;
      background:
        radial-gradient(740px 480px at 18% 18%, rgba(255,45,122,.16), transparent 62%),
        radial-gradient(820px 520px at 82% 22%, rgba(46,249,255,.12), transparent 64%),
        linear-gradient(120deg,
          rgba(255,45,122,.08) 0%,
          rgba(46,249,255,.06) 42%,
          rgba(168,85,247,.08) 100%
        ),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.18));
      mix-blend-mode: screen;
      opacity: .70;
      filter: blur(.2px);
    }

    .bg-live{
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events:none;
      overflow:hidden;
    }

    .bg-live .particles{
      position:absolute; inset:0;
      opacity:.12;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.16) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 20%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 76%, rgba(255,255,255,.08) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 66%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 60% 52%, rgba(255,45,122,.14) 0 1px, transparent 2px),
        radial-gradient(circle at 30% 62%, rgba(46,249,255,.14) 0 1px, transparent 2px);
      background-size: 520px 520px, 680px 680px, 760px 760px, 900px 900px, 700px 700px, 820px 820px;
      animation: particlesDrift 52s linear infinite;
    }
    @keyframes particlesDrift{
      0%{ transform: translate3d(0,0,0); }
      100%{ transform: translate3d(-3%, 2%, 0); }
    }

    .bg-live .stars{
      position:absolute;
      inset:-20% -10%;
      overflow:hidden;
      pointer-events:none;
    }

    .star{
      position:absolute;
      top:-12vh;
      color: rgba(255,255,255,.22);
      text-shadow:
        0 0 10px rgba(255,255,255,.10),
        0 0 14px rgba(46,249,255,.06);
      animation-name: fallStar;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      user-select:none;
      will-change: transform, opacity;
      filter: blur(.15px);
    }

    .star.gun{
      color: rgba(0,0,0,.28);
      text-shadow:
        0 0 14px rgba(46,249,255,.04),
        0 0 18px rgba(255,45,122,.04);
    }

    @keyframes fallStar{
      0%{
        transform: translate3d(0, -10vh, 0) rotate(0deg);
        opacity: 0;
      }
      8%{ opacity: .9; }
      92%{ opacity: .55; }
      100%{
        transform: translate3d(-24px, 120vh, 0) rotate(24deg);
        opacity: 0;
      }
    }

    .bg-live .vignette{
      position:absolute; inset:-2px;
      background: radial-gradient(circle at center, transparent 0 52%, rgba(0,0,0,.50) 78%, rgba(0,0,0,.84) 100%);
      opacity:.92;
    }

    @media (max-width: 900px){
      body{ background-attachment: scroll; }
    }

    #app{
      width:100%;
      max-width:1200px;
      position:relative;
      z-index:1;
    }

    .page-header{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      margin-bottom: 14px;
      padding-top: 6px;
    }

    .page-title-block{
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      padding: 8px 12px;
      transform: translateZ(0);
    }

    .page-title{
      font-size:56px;
      font-weight:900;
      letter-spacing:.02em;
      text-shadow:
        0 0 16px rgba(255,45,122,.22),
        0 0 34px rgba(46,249,255,.14),
        0 0 52px rgba(168,85,247,.10);
      position:relative;
      transform: translateZ(0);
      user-select:none;
      transition: filter var(--dur) var(--ease), transform var(--dur) var(--ease);
    }

    .page-title.glitching{
      filter: drop-shadow(0 0 18px rgba(46,249,255,.14)) drop-shadow(0 0 22px rgba(255,45,122,.14));
      transform: translateY(-1px);
    }

    .page-title::before,
    .page-title::after{
      content: attr(data-text);
      position:absolute;
      left:0; top:0;
      width:100%;
      opacity:0;
      pointer-events:none;
      mix-blend-mode: screen;
      filter: blur(.35px);
      transform: translateZ(0);
    }
    .page-title.glitching::before{
      opacity:.65;
      color: rgba(46,249,255,.95);
      transform: translate3d(-1.5px, 0, 0);
      animation: glitchA 320ms var(--ease2) 1;
    }
    .page-title.glitching::after{
      opacity:.55;
      color: rgba(255,45,122,.95);
      transform: translate3d(1.5px, 0, 0);
      animation: glitchB 320ms var(--ease2) 1;
    }
    @keyframes glitchA{
      0%{ clip-path: inset(0 0 70% 0); }
      35%{ clip-path: inset(20% 0 40% 0); }
      70%{ clip-path: inset(55% 0 12% 0); }
      100%{ clip-path: inset(0 0 0 0); }
    }
    @keyframes glitchB{
      0%{ clip-path: inset(70% 0 0 0); }
      35%{ clip-path: inset(35% 0 30% 0); }
      70%{ clip-path: inset(10% 0 60% 0); }
      100%{ clip-path: inset(0 0 0 0); }
    }

    .user-tag{
      font-size:12px;
      color: rgba(243,246,255,.62);
      margin-top:2px;
      opacity: .95;
      transition: opacity var(--dur) var(--ease);
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .last-update-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.14);
      box-shadow: 0 0 22px rgba(46,249,255,.06);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(243,246,255,.74);
      white-space: nowrap;
    }

    .last-update-chip strong{
      color: rgba(243,246,255,.92);
      letter-spacing: .02em;
    }

    .page-header-actions{
      position:absolute;
      right:0;
      top:0;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .btn{
      border: 1px solid rgba(46,249,255,.22);
      background: rgba(0,0,0,.14);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05) inset,
        0 0 26px rgba(46,249,255,.10),
        0 0 24px rgba(255,45,122,.08);
      color: rgba(243,246,255,.92);
      cursor:pointer;
      border-radius: 12px;
      transition: transform var(--dur-quick) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease), background var(--dur) var(--ease);
      will-change: transform;
    }
    .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,45,122,.55);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 0 34px rgba(46,249,255,.16),
        0 0 54px rgba(255,45,122,.18),
        0 0 62px rgba(168,85,247,.10);
    }
    .btn:active{ transform: translateY(0px) scale(.99); }
    .btn-sm{ padding: 11px 18px; font-size: 14px; }

    .btn-outline{
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.10);
      color: rgba(243,246,255,.92);
      cursor:pointer;
      border-radius: 12px;
      padding: 11px 18px;
      font-size: 14px;
      transition: transform var(--dur-quick) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease), background var(--dur) var(--ease);
      will-change: transform;
    }
    .btn-outline:hover{
      transform: translateY(-1px);
      border-color: rgba(46,249,255,.34);
      box-shadow: 0 0 24px rgba(46,249,255,.10);
    }
    .btn-outline:active{ transform: translateY(0px) scale(.99); }

    :focus-visible{
      outline: 2px solid var(--ring);
      outline-offset: 3px;
      border-radius: 10px;
    }

    .leader-panel{ background: transparent; border: none; box-shadow: none; }

    .leader-panel-header{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      margin-bottom: 14px;
      position:relative;
      z-index:2;
      width: 100%;
    }

    .leader-panel-header.sticky{
      position: sticky;
      top: 10px;
      padding: 10px 10px 12px;
      border-radius: 22px;
      background: rgba(0,0,0,.12);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 54px rgba(0,0,0,.26);
    }

    .leader-tabs{
      width: min(860px, 100%);
      margin: 0 auto;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      align-items: stretch;
      justify-content: center;
      padding: 4px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 18px 54px rgba(0,0,0,.34);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      transform: translateZ(0);
    }

    .tab-flow{
      position:absolute;
      left: 4px;
      top: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      border-radius: 18px;
      pointer-events:none;
      z-index: 0;
      opacity: 1;
      transform: translate3d(0,0,0);
      transition:
        left 760ms var(--ease2),
        width 760ms var(--ease2),
        opacity 420ms var(--ease2),
        box-shadow 760ms var(--ease2),
        background 760ms var(--ease2);
      background:
        radial-gradient(700px 200px at 18% 20%, rgba(255,45,122,.12), transparent 58%),
        radial-gradient(700px 220px at 82% 28%, rgba(46,249,255,.10), transparent 58%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.12));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 0 26px rgba(46,249,255,.10),
        0 0 26px rgba(255,45,122,.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .leader-tab{
      min-width: 0 !important;
      white-space: nowrap;
      position: relative;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      font-weight: 1000;
      font-size: 15px;
      letter-spacing: .10em;
      text-transform: uppercase;
      cursor: pointer;
      color: rgba(243,246,255,.72);
      background: transparent;
      box-shadow: none;
      transform: translateZ(0);
      will-change: transform, filter, color;
      transition:
        color 520ms var(--ease2),
        filter 520ms var(--ease2),
        transform 520ms var(--ease2);
      overflow:hidden;
      z-index: 1;
    }

    .leader-tab::before,
    .leader-tab::after{
      display:none;
      content:"";
    }

    .leader-tab .icon{
      filter: drop-shadow(0 0 12px rgba(46,249,255,.10));
      transform: translateZ(0);
    }

    .leader-tab:hover{
      transform: none;
      box-shadow: none;
      filter: saturate(1.06) brightness(1.02);
      color: rgba(255,255,255,.88);
    }

    .leader-tab.active{
      color: #fff;
      filter: saturate(1.12) brightness(1.04);
      box-shadow: none;
    }

    .leader-tabs.is-switching .leader-tab{
      transition:
        transform 820ms var(--ease2),
        filter 820ms var(--ease2),
        color 720ms var(--ease2);
    }

    @media (max-width: 720px){
      .leader-tabs{
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .leader-tab{
        border-radius: 18px;
        padding: 16px 16px;
      }
      .leader-tab:hover{
        transform: none;
      }
      .tab-flow{
        width: calc(100% - 8px);
      }
    }

    .leader-date{
      font-size: 18px;
      letter-spacing:.10em;
      color: rgba(243,246,255,.74);
      margin-top: 4px;
      text-shadow: 0 0 18px rgba(46,249,255,.10);
      transform: translateZ(0);
    }

    .crossfade{
      position:relative;
      display:inline-block;
      min-height: 1em;
    }
    .crossfade .cf-out{
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease), filter var(--dur) var(--ease);
    }
    .crossfade.is-swapping .cf-out{
      opacity: 0;
      transform: translateY(-4px);
      filter: blur(2px);
    }
    .crossfade .cf-in{
      position:absolute;
      left:0; right:0;
      top:0;
      opacity: 0;
      transform: translateY(6px);
      filter: blur(3px);
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease), filter var(--dur) var(--ease);
      pointer-events:none;
    }
    .crossfade.is-swapping .cf-in{
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    .leaders-wrapper{
      margin-top: 10px;
      display:flex;
      flex-direction:column;
      gap:18px;
      position:relative;
      z-index:1;
      transform: translateZ(0);
      will-change: transform, opacity, filter;
    }

    .leaders-wrapper.swap{
      animation-duration: var(--dur-slow);
      animation-timing-function: var(--ease2);
      animation-fill-mode: both;
    }

    @keyframes swapA{
      0%{ opacity:0; transform: translateY(12px); filter: blur(8px); }
      100%{ opacity:1; transform: translateY(0); filter: blur(0); }
    }
    @keyframes swapB{
      0%{ opacity:0; transform: translateX(18px) scale(.98); filter: blur(8px); }
      100%{ opacity:1; transform: translateX(0) scale(1); filter: blur(0); }
    }
    @keyframes swapC{
      0%{ opacity:0; transform: perspective(900px) rotateX(16deg) translateY(12px); filter: blur(10px); }
      100%{ opacity:1; transform: perspective(900px) rotateX(0deg) translateY(0); filter: blur(0); }
    }
    @keyframes swapD{
      0%{ opacity:0; transform: translateY(8px) scale(.96); clip-path: inset(0 0 100% 0); filter: blur(8px); }
      100%{ opacity:1; transform: translateY(0) scale(1); clip-path: inset(0 0 0 0); filter: blur(0); }
    }
    @keyframes swapE{
      0%{ opacity:0; transform: translateY(10px); filter: blur(9px) saturate(1.25); }
      60%{ opacity:1; transform: translateY(-2px); filter: blur(0) saturate(1.1); }
      100%{ opacity:1; transform: translateY(0); filter: blur(0) saturate(1); }
    }
    .leaders-wrapper.v1{ animation-name: swapA; }
    .leaders-wrapper.v2{ animation-name: swapB; }
    .leaders-wrapper.v3{ animation-name: swapC; }
    .leaders-wrapper.v4{ animation-name: swapD; }
    .leaders-wrapper.v5{ animation-name: swapE; }

    .leader-card{
      position:relative;
      display:flex;
      align-items:center;
      gap: 22px;
      padding: 18px 24px;
      border-radius: var(--rL);
      background: rgba(0,0,0,.14);
      border: 1px solid rgba(46,249,255,.14);
      box-shadow:
        0 18px 70px rgba(0,0,0,.38),
        0 0 26px rgba(46,249,255,.06),
        0 0 26px rgba(255,45,122,.04);
      overflow:hidden;
      clip-path: polygon(
        0% 0%,
        100% 0%,
        100% calc(100% - 26px),
        calc(100% - 26px) 100%,
        0% 100%,
        0% 0%
      );
      transition:
        transform var(--dur) var(--ease),
        box-shadow var(--dur) var(--ease),
        background var(--dur) var(--ease),
        border-color var(--dur) var(--ease),
        filter var(--dur) var(--ease);
      contain: paint;
      will-change: transform;
    }

    .leader-card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 82% 48%, rgba(0,0,0,.24), transparent 26%),
        radial-gradient(circle at 78% 44%, rgba(0,0,0,.18), transparent 18%);
      opacity:.9;
    }

    .leader-card::after{
      content:"🔫";
      position:absolute;
      right: 38px;
      top: 50%;
      transform: translateY(-50%) rotate(-10deg);
      font-size: 132px;
      color: rgba(0,0,0,.16);
      pointer-events:none;
      user-select:none;
      filter: blur(.2px);
      text-shadow: none;
      opacity: .9;
    }

    .leader-card:hover{
      transform: translateY(-6px);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(0,0,0,.12);
      border-color: rgba(255,45,122,.20);
      box-shadow:
        0 26px 92px rgba(0,0,0,.52),
        0 0 34px rgba(46,249,255,.14),
        0 0 42px rgba(255,45,122,.12),
        0 0 36px rgba(168,85,247,.10);
      filter: saturate(1.08) brightness(1.02);
    }

    .leader-card .sheen{
      position:absolute;
      inset:-40% -60%;
      pointer-events:none;
      background: linear-gradient(115deg,
        transparent 0%,
        rgba(255,255,255,.00) 35%,
        rgba(255,255,255,.12) 45%,
        rgba(255,45,122,.10) 50%,
        rgba(46,249,255,.10) 55%,
        rgba(255,255,255,.00) 65%,
        transparent 100%
      );
      transform: translateX(-60%) rotate(10deg);
      opacity: 0;
      transition: opacity var(--dur) var(--ease);
      mix-blend-mode: screen;
    }
    .leader-card:hover .sheen{
      opacity: 1;
      animation: sheenSweep .75s var(--ease2) 1;
    }
    @keyframes sheenSweep{
      0%{ transform: translateX(-60%) rotate(10deg); }
      100%{ transform: translateX( 60%) rotate(10deg); }
    }

    .leader-icon{
      width: 62px;
      height: 62px;
      border-radius: 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 28px;
      background: rgba(0,0,0,.12);
      border: 1px solid rgba(46,249,255,.16);
      box-shadow:
        0 0 26px rgba(46,249,255,.10),
        0 0 18px rgba(255,45,122,.06);
      flex-shrink:0;
      position: relative;
      overflow: hidden;
    }

    .leader-icon::before{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.12));
      pointer-events:none;
    }

    .leader-avatar{
      width: 74px;
      height: 74px;
      border-radius: 18px;
      border: 1px solid rgba(255,45,122,.28);
      background: rgba(0,0,0,.12);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      color: rgba(255,255,255,.88);
      font-size: 26px;
      flex-shrink:0;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05) inset,
        0 0 22px rgba(255,45,122,.10);
      position: relative;
      z-index: 1;
    }
    .leader-avatar img{ width:100%; height:100%; object-fit: cover; }

    .leader-main{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:10px;
      position: relative;
      z-index: 1;
    }

    .leader-name-row{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap: 12px;
    }

    .leader-nick{
      font-size: 32px;
      font-weight: 900;
      letter-spacing: .01em;
      text-shadow:
        0 0 16px rgba(255,45,122,.12),
        0 0 24px rgba(46,249,255,.10);
      white-space:nowrap;

<body>
  <div class="bg-live" aria-hidden="true">

  <div class="cursor-glow" id="cursor-glow"></div>

  <div id="app">
    <div class="page-header">
      <div class="page-title-block">
        <div class="page-title" id="page-title" data-text="ТОП ЛИДЕРОВ PD">ТОП ЛИДЕРОВ PD</div>

  <div id="error-modal" class="modal-backdrop">
    <div class="modal">
      <h3>Ошибка</h3>

        <button class="btn btn-sm" id="error-modal-close">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;

    function loadSession() {
      try { return JSON.parse(localStorage.getItem("pp_user")); }
      catch { return null; }
    }

    function canBulkEdit(user) {
      const role = String(user?.role || "").trim().toLowerCase();
      return role === "admin" || role === "creator";
    }

    const API_BASE = "https://world-script-api.onrender.com/api";

    const memCache = new Map();
    const CACHE_CFG = { day: 30 * 60 * 1000, week: 30 * 60 * 1000 }; 

    function nowMs(){ return Date.now(); }
    function cacheKey(path){ return "cache:" + path; }

    function readCache(path){
      const k = cacheKey(path);
      const mem = memCache.get(k);
      if (mem && mem.exp > nowMs()) return mem.val;

      try{
        const raw = localStorage.getItem(k);
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (!obj || obj.exp <= nowMs()) return null;
        memCache.set(k, obj);
        return obj.val;
      }catch{ return null; }
    }

    function writeCache(path, val, ttl){
      const k = cacheKey(path);
      const obj = { val, exp: nowMs() + ttl };
      memCache.set(k, obj);
      try{ localStorage.setItem(k, JSON.stringify(obj)); }catch{}
    }

    function invalidateCache(path){
      const k = cacheKey(path);
      memCache.delete(k);
      try{ localStorage.removeItem(k); }catch{}
    }

    let activeController = null;
    let autoRefreshTimer = null;
    let lastUpdateAt = null;
    let currentDayRows = [];
    let currentWeekRows = [];

    async function apiGet(path, opts = {}) {
      const useCache = Number.isFinite(opts.cacheTtl) && opts.cacheTtl > 0;
      if (useCache){
        const cached = readCache(path);
        if (cached) return cached;
      }

      if (opts.abortPrev && activeController){
        try{ activeController.abort(); }catch{}
      }

      const controller = new AbortController();
      if (opts.abortPrev) activeController = controller;

      const r = await fetch(API_BASE + path, { credentials: "include", signal: controller.signal });
      if (!r.ok) throw new Error(await r.text());
      const json = await r.json();
      if (useCache) writeCache(path, json, opts.cacheTtl);
      return json;
    }

    async function apiPost(path, body, extraHeaders = {}) {
      const r = await fetch(API_BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...extraHeaders },
        credentials: "include",
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    const toastHost = document.getElementById("toast-host");

    function toastIcon(type){
      if (type === "ok") return "✅";
      if (type === "warn") return "⚠️";
      if (type === "err") return "⛔";
      return "✨";
    }

    function toastTitle(type){
      if (type === "ok") return "Готово";
      if (type === "warn") return "Внимание";
      if (type === "err") return "Ошибка";
      return "Сообщение";
    }

    function showToast(text, type = "info", ms = 2600){
      if (!toastHost) return;
      const el = document.createElement("div");
      el.className = "toast";
      el.innerHTML = `
        <div class="toast-ico">${toastIcon(type)}</div>
        <div class="toast-body">
          <div class="toast-title">${toastTitle(type)}</div>
          <div class="toast-text"></div>
        </div>
        <button class="toast-close" aria-label="close">✕</button>
      `;
      el.querySelector(".toast-text").textContent = text || "";
      const close = () => {
        el.classList.add("out");
        setTimeout(() => { try{ el.remove(); }catch{} }, 460);
      };
      el.querySelector(".toast-close").onclick = close;
      toastHost.appendChild(el);
      setTimeout(close, ms);
    }

    const errorModal = document.getElementById("error-modal");
    const errorModalText = document.getElementById("error-modal-text");
    const errorModalClose = document.getElementById("error-modal-close");

    function showErrorModal(message) {
      if (!errorModal || !errorModalText) return;
      errorModalText.textContent = message || "Неизвестная ошибка";
      errorModal.classList.add("active");
    }
    if (errorModalClose) errorModalClose.onclick = () => errorModal.classList.remove("active");

    function monthRuUpper(monthIndex) {
      const m = ["ЯНВАРЬ","ФЕВРАЛЬ","МАРТ","АПРЕЛЬ","МАЙ","ИЮНЬ","ИЮЛЬ","АВГУСТ","СЕНТЯБРЬ","ОКТЯБРЬ","НОЯБРЬ","ДЕКАБРЬ"];
      return m[monthIndex] || "";
    }
    function parseDateOnly(iso) {
      const [y,m,d] = String(iso).split("-").map(Number);
      return new Date(y, (m || 1) - 1, d || 1);
    }
    function formatPeriodRu(startISO, endISO) {
      const s = parseDateOnly(startISO);
      const e = parseDateOnly(endISO);
      return `С ${s.getDate()} ${monthRuUpper(s.getMonth())} ${s.getFullYear()} по ${e.getDate()} ${monthRuUpper(e.getMonth())} ${e.getFullYear()}`;
    }

    const leadersWrapper = document.getElementById("leaders-wrapper");
    const dateWrap = document.getElementById("leader-date-wrap");
    const dateOut = document.getElementById("leader-date");
    const dateIn = document.getElementById("leader-date-next");
    const lastUpdateText = document.getElementById("last-update-text");

    const panelHeader = document.getElementById("panel-header");
    const deptPodiumEl = document.getElementById("dept-podium");

    const tabsWrap = document.getElementById("tabs-wrap");
    const tabFlow = document.getElementById("tab-flow");
    const tabDay = document.getElementById("tab-day");
    const tabWeek = document.getElementById("tab-week");

    let currentPeriod = "day";
    let weeklyData = [];
    let activeDeptFilter = null;
    let switchingTabs = false;

    function setStickyHeader(){
      if(!panelHeader) return;
      const y = window.scrollY || document.documentElement.scrollTop || 0;
      panelHeader.classList.toggle("sticky", y > 90);
    }
    window.addEventListener("scroll", setStickyHeader, { passive: true });

    const pageTitle = document.getElementById("page-title");
    function triggerGlitch(){
      if(!pageTitle) return;
      pageTitle.classList.add("glitching");
      setTimeout(() => pageTitle.classList.remove("glitching"), 360);
    }
    if (pageTitle){
      pageTitle.addEventListener("mouseenter", triggerGlitch);
      setInterval(() => {
        if (Math.random() < 0.085) triggerGlitch();
      }, 4500);
    }

    const cursorGlow = document.getElementById("cursor-glow");
    function canUseCursorGlow(){
      const coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
      return !coarse;
    }
    if (cursorGlow && canUseCursorGlow()){
      document.body.classList.add("cursor-on");
      let raf = 0;
      let tx = 0, ty = 0;
      window.addEventListener("mousemove", (e) => {
        tx = e.clientX; ty = e.clientY;
        if (raf) return;
        raf = requestAnimationFrame(() => {
          cursorGlow.style.left = tx + "px";
          cursorGlow.style.top = ty + "px";
          raf = 0;
        });
      }, { passive: true });
    }

    function initStars() {
      const layer = document.getElementById("stars-layer");
      if (!layer) return;
      layer.innerHTML = "";
      const count = window.innerWidth < 720 ? 18 : 34;
      const pool = ["✦","✧","★","☆","🔫"];

      for (let i = 0; i < count; i++) {
        const el = document.createElement("div");
        const ch = pool[Math.floor(Math.random() * pool.length)];
        el.className = "star" + (ch === "🔫" ? " gun" : "");
        el.textContent = ch;
        const left = Math.random() * 100;
        const delay = Math.random() * 18;
        const dur = 16 + Math.random() * 22;
        const size = ch === "🔫"
          ? (18 + Math.random() * 18)
          : (10 + Math.random() * 16);
        const opacity = ch === "🔫"
          ? (0.16 + Math.random() * 0.10)
          : (0.20 + Math.random() * 0.18);

        el.style.left = left + "%";
        el.style.fontSize = size + "px";
        el.style.animationDuration = dur + "s";
        el.style.animationDelay = (-delay) + "s";
        el.style.opacity = opacity;

        layer.appendChild(el);
      }
    }
    window.addEventListener("resize", initStars);

    function updateLastUpdateText(ts) {
      if (!lastUpdateText) return;
      if (!ts) {
        lastUpdateText.textContent = "—";
        return;
      }

      const d = new Date(ts);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      lastUpdateText.textContent = `${hh}:${mm}:${ss}`;
    }

    function crossfadeText(next){
      if (!dateWrap || !dateOut || !dateIn) return;
      dateIn.textContent = next || "";
      dateWrap.classList.add("is-swapping");
      setTimeout(() => {

      const d = String(dept || "").trim().toUpperCase();
      if (d === "LSPD") return "lspd";

    function toISODateOnly(x){
      const s = String(x || "").trim();
      return s ? s.slice(0, 10) : "0000-00-00";
    }

    function sortWeeksDesc(rows){
      return (rows || []).slice().sort((a, b) => {
        const ae = toISODateOnly(a?.week_end || a?.week_start);
        const be = toISODateOnly(b?.week_end || b?.week_start);
        if (be > ae) return 1;
        if (be < ae) return -1;
        return 0;
      });
    }

    function pickNum(row, ...keys){
      for (const k of keys){
        if (row && row[k] != null && row[k] !== ""){
          const v = Number(row[k]);
          if (Number.isFinite(v)) return v;
        }
      }
      return null;
    }

    function sumDeptAshFromRow(row){
      const lspd = pickNum(row, "lspd_ash", "ash_lspd", "total_lspd", "lspd_total", "lspd");
      const sfpd = pickNum(row, "sfpd_ash", "ash_sfpd", "total_sfpd", "sfpd_total", "sfpd");
      const lvpd = pickNum(row, "lvpd_ash", "ash_lvpd", "total_lvpd", "lvpd_total", "lvpd");
      if (lspd !== null || sfpd !== null || lvpd !== null){
        return { LSPD: lspd ?? 0, SFPD: sfpd ?? 0, LVPD: lvpd ?? 0 };
      }
      const acc = { LSPD: 0, SFPD: 0, LVPD: 0 };
      const put = (dept, ash) => {
        const d = String(dept || "").trim().toUpperCase();
        if (d !== "LSPD" && d !== "SFPD" && d !== "LVPD") return;
        const v = Number(ash || 0);
        acc[d] += (Number.isFinite(v) ? v : 0);
      };
      put(row?.dept_1, row?.ash_1);
      put(row?.dept_2, row?.ash_2);
      put(row?.dept_3, row?.ash_3);
      return acc;
    }

    function rankDeptsFromLast3Weeks(rows){
      const sorted = sortWeeksDesc(rows);
      const last3 = sorted.slice(0, 3);
      const total = { LSPD: 0, SFPD: 0, LVPD: 0 };
      for (const row of last3){
        const s = sumDeptAshFromRow(row);
        total.LSPD += Number(s.LSPD || 0);
        total.SFPD += Number(s.SFPD || 0);
        total.LVPD += Number(s.LVPD || 0);
      }
      return [
        { dept: "LSPD", val: total.LSPD },
        { dept: "SFPD", val: total.SFPD },
        { dept: "LVPD", val: total.LVPD },
      ].sort((a,b) => b.val - a.val);
    }

    function animateNumber(el, from, to, ms = 700){
      if (!el) return;
      const a = Number(from);
      const b = Number(to);
      if (!Number.isFinite(a) || !Number.isFinite(b)){
        el.textContent = String(to);
        el.classList.add("swap");
        setTimeout(() => el.classList.remove("swap"), 760);
        return;
      }
      const start = performance.now();
      const ease = (t) => 1 - Math.pow(1 - t, 3);

      const step = (now) => {
        const p = Math.min(1, (now - start) / ms);
        const v = Math.round(a + (b - a) * ease(p));
        el.textContent = String(v);
        if (p < 1) requestAnimationFrame(step);
      };

      el.classList.remove("swap");
      void el.offsetWidth;
      el.classList.add("swap");
      requestAnimationFrame(step);
      setTimeout(() => el.classList.remove("swap"), 760);
    }

        el.setAttribute("data-prev", String(to));
        animateNumber(el, prev, to, 760);
      });
    }

    function bestDeptForRow(row){
      const totals = sumDeptAshFromRow(row);
      const list = [
        { dept: "LSPD", val: Number(totals.LSPD||0) },
        { dept: "SFPD", val: Number(totals.SFPD||0) },
        { dept: "LVPD", val: Number(totals.LVPD||0) },
      ].sort((a,b)=>b.val-a.val);
      return list[0]?.dept || "—";
    }

    function trendForRow(curr, prev){
      const a = Number(curr?.total_ash || 0);
      const b = Number(prev?.total_ash || 0);
      const diff = a - b;
      if (diff > 0) return { cls:"trend-up", sym:"↑", diff };
      if (diff < 0) return { cls:"trend-down", sym:"↓", diff };
      return { cls:"trend-flat", sym:"→", diff: 0 };
    }

    function updateTabFlowFor(btn, immediate = false){
      if(!tabsWrap || !tabFlow || !btn) return;
      const w = tabsWrap.getBoundingClientRect();
      const b = btn.getBoundingClientRect();
      const left = (b.left - w.left) + tabsWrap.scrollLeft;
      const width = b.width;

      if (window.innerWidth <= 720) {
        const top = (b.top - w.top) + tabsWrap.scrollTop;
        const height = b.height;

        if (immediate){
          tabFlow.style.transition = "none";
          tabFlow.style.left = "4px";
          tabFlow.style.top = top + "px";
          tabFlow.style.width = `calc(100% - 8px)`;
          tabFlow.style.height = height + "px";
          tabFlow.style.opacity = "1";
          void tabFlow.offsetWidth;
          tabFlow.style.transition = "";
          return;
        }

        tabFlow.style.left = "4px";
        tabFlow.style.top = top + "px";
        tabFlow.style.width = `calc(100% - 8px)`;
        tabFlow.style.height = height + "px";
        tabFlow.style.opacity = "1";
        return;
      }

      if (immediate){
        tabFlow.style.transition = "none";
        tabFlow.style.left = left + "px";
        tabFlow.style.top = "4px";
        tabFlow.style.width = width + "px";
        tabFlow.style.height = `calc(100% - 8px)`;
        tabFlow.style.opacity = "1";
        void tabFlow.offsetWidth;
        tabFlow.style.transition = "";
        return;
      }

      tabFlow.style.left = left + "px";
      tabFlow.style.top = "4px";
      tabFlow.style.width = width + "px";
      tabFlow.style.height = `calc(100% - 8px)`;
      tabFlow.style.opacity = "1";
    }

    function setActiveTabSmooth(nextBtn){
      if(!tabDay || !tabWeek || !tabsWrap) return;
      const prevBtn = tabDay.classList.contains("active") ? tabDay : tabWeek;
      if (prevBtn === nextBtn) return;
      if (switchingTabs) return;
      switchingTabs = true;

      tabsWrap.classList.add("is-switching");
      updateTabFlowFor(nextBtn, false);

      prevBtn.style.transition = "filter 820ms var(--ease2), color 720ms var(--ease2)";
      nextBtn.style.transition = "filter 820ms var(--ease2), color 720ms var(--ease2)";

      prevBtn.style.filter = "blur(.35px) saturate(.96)";
      nextBtn.style.filter = "saturate(1.08) brightness(1.02)";

      requestAnimationFrame(() => {
        tabDay.classList.remove("active");
        tabWeek.classList.remove("active");
        nextBtn.classList.add("active");

        setTimeout(() => {
          prevBtn.style.filter = "";
          nextBtn.style.filter = "";
          prevBtn.style.transition = "";
          nextBtn.style.transition = "";
          tabsWrap.classList.remove("is-switching");
          switchingTabs = false;
        }, 900);
      });
    }

      };

      };

        reader.onload = () => {
          bulkAvatarByDept[row.department] = reader.result;
          avatar.innerHTML = `<img src="${reader.result}">`;
        };
        reader.readAsDataURL(f);
      };

      const nickInput = document.createElement("input");
      nickInput.value = row.nick || "";
      const accInput = document.createElement("input");
      accInput.value = row.account_id || "";

      const right = document.createElement("div");
      right.innerHTML = `
        <div class="field"><label>${row.department} ник</label></div>
        <div class="field"><label>${row.department} аккаунт</label></div>
      `;
      right.children[0].appendChild(nickInput);
      right.children[1].appendChild(accInput);

      wrap.appendChild(avatar);
      wrap.appendChild(fileInput);
      wrap.appendChild(right);

      return { wrap, nickInput, accInput };
    }

    async function buildBulkModal(){
      bulkFormsEl.innerHTML = "";
      const sk = document.createElement("div");
      sk.className = "skeleton";
      sk.style.height = "220px";
      sk.style.borderRadius = "16px";
      bulkFormsEl.appendChild(sk);

      bulkRows = await fetchLeadersForDepts();
      bulkFormsEl.innerHTML = "";

      bulkRows.forEach(row => {
        const ui = createBulkCard(row);
        row._ui = ui;
        bulkFormsEl.appendChild(ui.wrap);
      });
    }

    async function saveBulk(){
      hideBulkError();

      for(const row of bulkRows){
        if(!row.id) return showBulkError(`Нет записи leaderinfo для ${row.department}`);
        if(!row._ui.nickInput.value || !row._ui.accInput.value) return showBulkError(`Заполни все поля (${row.department})`);
      }

      const rows = bulkRows.map(row => ({
        id: row.id,
        department: row.department,
        nick: row._ui.nickInput.value.trim(),
        account_id: row._ui.accInput.value.trim(),
        avatar_base64: bulkAvatarByDept[row.department] || null
      }));

      try {
        await apiPost("/leaders/bulk", { rows });
        invalidateCache("/leaders/day?limit=3");
        invalidateCache("/leaders/week?limit=8");
        closeBulkModal();
        showToast("Изменения сохранены.", "ok", 2200);
        currentPeriod === "week" ? loadWeeklyBlocks() : loadLeaders();
      } catch (e) {
        showBulkError(String(e.message || e));
        showToast("Не удалось сохранить изменения.", "err", 2800);
      }
    }

    if(editLeadersTopBtn){
      editLeadersTopBtn.onclick = async () => {
        openBulkModal();
        await buildBulkModal();
      };
    }
    if(bulkCancelBtn) bulkCancelBtn.onclick = closeBulkModal;
    if(bulkSaveBtn) bulkSaveBtn.onclick = saveBulk;

    const userTagEl = document.getElementById("user-tag");

    function rowsEqualSimple(a, b){
      return JSON.stringify(a || []) === JSON.stringify(b || []);
    }

    function markUpdated(){
      lastUpdateAt = new Date();
      updateLastUpdateText(lastUpdateAt);
    }

    async function loadLeaders(force = false){
      currentPeriod = "day";
      activeDeptFilter = null;
      if (deptPodiumEl) deptPodiumEl.style.display = "none";

      setDateDay();

      if (!force) {
        crossfadeSwap();
        skeletonDay();
      }

      try {
        const rows = await apiGet("/leaders/day?limit=3", { abortPrev: true, cacheTtl: force ? 0 : CACHE_CFG.day });
        if (!rows || !rows.length){
          emptyState("Нет данных за день", "Пока никто не набрал активность. Загляни чуть позже.", "🛰️");
          return;
        }

        const slots = [0,1,2].map((i) => rows?.[i] || null);
        const changed = !rowsEqualSimple(currentDayRows, slots);

        currentDayRows = slots;

        if (!force || !leadersWrapper.children.length) {
          leadersWrapper.innerHTML = "";
          slots.forEach((row, idx) => leadersWrapper.appendChild(renderLeaderCard(idx + 1, row)));
          animateAllNumbers(leadersWrapper);
        } else if (changed) {
          const prevNumbers = Array.from(leadersWrapper.querySelectorAll(".num-anim")).map(x => Number(x.textContent || 0));
          leadersWrapper.innerHTML = "";
          slots.forEach((row, idx) => leadersWrapper.appendChild(renderLeaderCard(idx + 1, row)));
          leadersWrapper.querySelectorAll(".num-anim").forEach((el, i) => {
            el.setAttribute("data-prev", String(prevNumbers[i] || 0));
          });
          animateAllNumbers(leadersWrapper);
          triggerGlitch();
        }

        markUpdated();
      } catch (e) {
        if (String(e?.name || "").toLowerCase() === "aborterror") return;
        emptyState("Ошибка сети", "Не удалось загрузить рейтинг дня. Проверь соединение и попробуй снова.", "📡");
        showToast("Не удалось загрузить данные дня.", "err", 2800);
      }
    }

    async function loadWeeklyBlocks(force = false){
      currentPeriod = "week";

      setDateBlank();

      if (!force) {
        crossfadeSwap();
        skeletonWeek();
      }

      try {
        const data = await apiGet("/leaders/week?limit=8", { abortPrev: true, cacheTtl: force ? 0 : CACHE_CFG.week });
        weeklyData = Array.isArray(data) ? data : [];

        if (!weeklyData.length){
          if (deptPodiumEl) deptPodiumEl.style.display = "none";
          emptyState("Нет данных по неделям", "Сводки появятся после закрытия первой недели.", "🗓️");
          return;
        }

        const changed = !rowsEqualSimple(currentWeekRows, weeklyData);
        currentWeekRows = weeklyData;

        if (deptPodiumEl) {
          deptPodiumEl.style.display = "grid";
          const ranked = rankDeptsFromLast3Weeks(weeklyData);
          renderDeptPodium(ranked);
        }

        if (!force || !leadersWrapper.children.length) {
          leadersWrapper.innerHTML = "";
          weeklyData.forEach((row, idx) => {
            leadersWrapper.appendChild(renderWeeklySummaryBlock(row, idx, weeklyData));
          });
          animateAllNumbers(leadersWrapper);
          applyWeekDeptHighlight();
        } else if (changed) {
          const prevNumbers = Array.from(leadersWrapper.querySelectorAll(".num-anim")).map(x => Number(x.textContent || 0));
          leadersWrapper.innerHTML = "";
          weeklyData.forEach((row, idx) => {
            leadersWrapper.appendChild(renderWeeklySummaryBlock(row, idx, weeklyData));
          });
          leadersWrapper.querySelectorAll(".num-anim").forEach((el, i) => {
            el.setAttribute("data-prev", String(prevNumbers[i] || 0));
          });
          animateAllNumbers(leadersWrapper);
          applyWeekDeptHighlight();
          triggerGlitch();
        }

        markUpdated();
      } catch (e) {
        if (String(e?.name || "").toLowerCase() === "aborterror") return;
        if (deptPodiumEl) deptPodiumEl.style.display = "none";
        emptyState("Ошибка загрузки", "Не удалось загрузить недельную активность. Попробуй ещё раз.", "🧯");
        showToast("Не удалось загрузить данные недели.", "err", 2800);
      }
    }

    function switchPeriod(period){
      if (period === currentPeriod) return;
      if (period === "week") loadWeeklyBlocks();
      else loadLeaders();
    }

    function startAutoRefresh(){
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      autoRefreshTimer = setInterval(async () => {
        if (currentPeriod === "week") await loadWeeklyBlocks(true);
        else await loadLeaders(true);
      }, 1800000);
    }

    async function initPage() {
      currentUser = loadSession();
      if (userTagEl) {}

      const editBtn = document.getElementById("edit-leaders-top");
      if (editBtn) editBtn.style.display = "none";

      const myNick = String(currentUser?.nick || "").trim();

      if (editBtn && myNick) {
        try {
          const r = await apiGet(`/users/can-edit?nick=${encodeURIComponent(myNick)}`, { abortPrev: false, cacheTtl: 0 });
          if (r?.ok) editBtn.style.display = "inline-flex";
        } catch {}
      }

      setStickyHeader();
      setDateDay();
      initStars();
      syncTabFlowImmediate();
      updateLastUpdateText(null);
      await loadLeaders();
      startAutoRefresh();
    }

    window.addEventListener("load", initPage);
  </script>
</body>
</html>
