<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WS — Профиль 2.0</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#050a18;
      --bg1:#071028;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.04);
      --stroke: rgba(140,170,255,.18);
      --stroke2: rgba(140,170,255,.12);
      --txt: rgba(245,248,255,.92);
      --muted: rgba(215,230,255,.62);
      --muted2: rgba(215,230,255,.48);
      --brand:#3d7dff;
      --violet:#7c3aed;
      --ok:#1bd760;
      --warn:#ffcc66;
      --bad:#ff5a7a;

      --r16:16px;
      --r20:20px;
      --r24:24px;
      --r28:28px;
      --shadow: 0 26px 70px rgba(0,0,0,.34);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--txt);
      font-family:Inter,system-ui,Arial,sans-serif;
      background:
        radial-gradient(circle at 18% 14%, rgba(61,125,255,.20), transparent 34%),
        radial-gradient(circle at 82% 12%, rgba(124,58,237,.18), transparent 36%),
        radial-gradient(circle at 50% 100%, rgba(30,90,255,.10), transparent 40%),
        linear-gradient(180deg, #020819, #020613 70%, #01040c);
      overflow-x:hidden;
    }

    .bg-grid{
      position:fixed; inset:0; pointer-events:none; opacity:.06;
      background-image:
        linear-gradient(rgba(120,160,255,.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,160,255,.28) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.85), transparent 85%);
      -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,.85), transparent 85%);
    }

    .shell{
      position:relative;
      max-width:1550px;
      margin:0 auto;
      padding:16px 16px 26px;
    }

    .topbar{
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      margin-bottom:14px;
    }
    .btn{
      appearance:none; border:1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(18,31,67,.92), rgba(10,19,46,.94));
      color:#fff; text-decoration:none;
      padding:12px 16px; border-radius:16px;
      font-weight:900; letter-spacing:.01em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 18px 40px rgba(0,0,0,.22);
      cursor:pointer; transition:.16s ease;
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      min-height:46px;
    }
    .btn:hover{ transform:translateY(-1px); border-color:rgba(140,170,255,.32) }
    .btn-primary{
      background: linear-gradient(180deg, #3d7dff 0%, #2b5fdd 100%);
      border-color: rgba(120,160,255,.25);
    }
    .btn-ghost{
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .layout{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:14px;
      align-items:start;
    }

    .card{
      border:1px solid var(--stroke2);
      background: linear-gradient(135deg, rgba(17,29,63,.86), rgba(8,16,40,.94));
      border-radius:var(--r28);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .card .inner{ padding:18px; }
    .glow{
      position:absolute; width:380px; height:380px; border-radius:999px;
      filter: blur(70px);
      opacity:.16;
      pointer-events:none;
    }
    .glow.blue{ background:#2f69ff; left:-130px; top:-160px; }
    .glow.violet{ background:#7c3aed; right:-160px; top:-180px; }

    /* Sidebar */
    .me-banner{
      height:86px;
      background:
        radial-gradient(circle at 25% 30%, rgba(255,255,255,.16), transparent 40%),
        linear-gradient(180deg, rgba(61,125,255,.30), rgba(124,58,237,.18));
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .me-head{
      display:flex; gap:12px; align-items:center;
      margin-top:-24px;
      padding: 0 18px 14px;
    }
    .avatar{
      width:64px; height:64px; border-radius:18px; overflow:hidden;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      flex:none;
    }
    .avatar img{width:100%;height:100%;object-fit:cover;display:block}
    .me-meta{min-width:0}
    .me-name{
      font-size:18px; font-weight:900; line-height:1.1; margin:0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .me-sub{margin-top:4px;color:var(--muted);font-weight:700;font-size:13px}

    .role-pill{
      display:inline-flex; align-items:center; gap:8px;
      margin-top:10px;
      font-size:12px; font-weight:900; text-transform:uppercase;
      padding:8px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.90);
    }

    .nav{
      padding: 12px;
      display:flex; flex-direction:column; gap:8px;
    }
    .nav a{
      text-decoration:none; color:rgba(255,255,255,.86);
      padding:12px 12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      font-weight:850;
      transition:.15s ease;
    }
    .nav a:hover{ transform: translateY(-1px); border-color: rgba(140,170,255,.22); }
    .nav a.active{
      background: linear-gradient(180deg, rgba(61,125,255,.35), rgba(43,95,221,.18));
      border-color: rgba(120,160,255,.30);
    }
    .nav .left{ display:flex; align-items:center; gap:10px; min-width:0; }
    .nav .label{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .badge{
      min-width: 24px;
      height: 22px;
      padding: 0 8px;
      border-radius:999px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:900;
      color:#fff;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
    }
    .badge.blue{ background: rgba(61,125,255,.35); border-color: rgba(120,160,255,.30); }
    .badge.red{ background: rgba(255,90,122,.26); border-color: rgba(255,90,122,.26); }

    /* Main */
    .main-head{
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
      padding: 18px 18px 0;
    }
    .title{
      margin:0;
      font-size: clamp(26px, 2.2vw, 40px);
      font-weight: 950;
      letter-spacing: -0.04em;
    }
    .subtitle{
      margin-top:8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      line-height:1.4;
    }

    .content{ padding: 16px 18px 18px; }
    .grid{
      display:grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
    }
    .tile{
      border: 1px solid rgba(140,170,255,.14);
      background: linear-gradient(180deg, rgba(6,16,41,.72), rgba(4,10,27,.94));
      border-radius: 18px;
      padding: 14px;
      min-height: 110px;
    }
    .tile .k{ color: rgba(214,226,255,.62); font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.12em;}
    .tile .v{ margin-top:10px; font-size:22px; font-weight:950; }
    .tile .s{ margin-top:8px; color: rgba(214,226,255,.58); font-size:13px; font-weight:650; line-height:1.35; }

    .feed-item{
      padding: 12px 14px;
      border: 1px solid rgba(120,160,255,.14);
      background: rgba(255,255,255,.03);
      border-radius: 14px;
      margin-bottom:10px;
    }
    .feed-item .a{ font-weight:850; }
    .feed-item .m{ margin-top:4px; color: rgba(255,255,255,.62); font-size:13px; font-weight:650; }

    .muted{ color: var(--muted); font-weight:650; }
    .hr{ height:1px; background: rgba(255,255,255,.08); margin:14px 0; }

    .progress{
      height: 14px;
      border-radius: 999px;
      overflow:hidden;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
    }
    .progress > div{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, #4e7fff, #9ac2ff);
      box-shadow: 0 0 18px rgba(79,141,255,.28);
    }

    .inv-grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .inv{
      border: 1px solid rgba(122,162,255,.16);
      background: linear-gradient(180deg, rgba(18,28,60,.86), rgba(8,14,35,.88));
      padding: 12px;
      border-radius: 16px;
    }
    .inv .img{
      width:100%; aspect-ratio:1/1; border-radius: 14px; overflow:hidden;
      background: rgba(255,255,255,.03); margin-bottom:10px;
    }
    .inv .img img{width:100%;height:100%;object-fit:cover;display:block}
    .inv .name{ font-weight:900; font-size:14px; }
    .inv .meta{ margin-top:4px; font-size:12px; color: rgba(255,255,255,.58); }
    .inv .count{
      margin-top:10px;
      display:inline-flex; align-items:center; justify-content:center;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(61,125,255,.18);
      border: 1px solid rgba(120,160,255,.22);
      font-weight: 900;
      font-size: 13px;
    }

    .error{
      display:none;
      margin-bottom:12px;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(90deg, rgba(70,10,38,.92), rgba(50,10,28,.82));
      border: 1px solid rgba(255,84,84,.34);
      color: #ffe3e3;
      font-weight: 750;
      line-height:1.45;
    }

    .skeleton{
      position:relative;
      overflow:hidden;
    }
    .skeleton::after{
      content:"";
      position:absolute; inset:-40%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
      transform: translateX(-30%);
      animation: sk 1.2s infinite linear;
    }
    @keyframes sk{ to { transform: translateX(30%); } }

    @media (max-width: 1100px){
      .layout{ grid-template-columns:1fr; }
    }
    @media (max-width: 640px){
      .shell{ padding:12px 12px 22px; }
      .topbar{ flex-direction:column; align-items:stretch; }
      .btn{ width:100%; }
      .main-head{ padding: 16px 16px 0; }
      .content{ padding: 14px 16px 16px; }
      .nav{ flex-direction:row; flex-wrap:wrap; }
      .nav a{ flex: 1 1 calc(50% - 8px); }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="shell">
    <div class="topbar">
      <a class="btn btn-ghost" href="index.html">← Назад на сайт</a>
      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
        <button id="btnReload" class="btn btn-primary" type="button">Обновить</button>
        <button id="btnLogout" class="btn" type="button">Выйти</button>
      </div>
    </div>

    <div id="errorBox" class="error"></div>

    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="card">
        <div class="glow blue"></div>
        <div class="me-banner" id="bannerEl"></div>
        <div class="me-head">
          <div class="avatar"><img id="avatarEl" alt="avatar" /></div>
          <div class="me-meta">
            <p id="meName" class="me-name">WS</p>
            <div id="meSub" class="me-sub">@unknown</div>
            <div id="rolePill" class="role-pill">ROLE</div>
          </div>
        </div>

        <nav class="nav" id="nav">
          <a href="#overview" data-tab="overview"><span class="left"><span>⚡</span><span class="label">Обзор</span></span><span class="badge" id="b1"> </span></a>
          <a href="#contracts" data-tab="contracts"><span class="left"><span>📜</span><span class="label">Контракты</span></span><span class="badge blue" id="bContracts">0</span></a>
          <a href="#inventory" data-tab="inventory"><span class="left"><span>🎒</span><span class="label">Инвентарь</span></span><span class="badge" id="bInv">0</span></a>
          <a href="#progress" data-tab="progress"><span class="left"><span>🏆</span><span class="label">Прогресс</span></span><span class="badge" id="bLvl">1</span></a>
          <a href="#notifications" data-tab="notifications"><span class="left"><span>🔔</span><span class="label">Уведомления</span></span><span class="badge red" id="bNotif">0</span></a>
          <a href="#wsbuild" data-tab="wsbuild"><span class="left"><span>⚙️</span><span class="label">WSBuild</span></span><span class="badge" id="bWsb">0</span></a>
          <a href="#settings" data-tab="settings"><span class="left"><span>🛠</span><span class="label">Настройки</span></span><span class="badge" id="bSet"> </span></a>
        </nav>
      </aside>

      <!-- MAIN -->
      <main class="card">
        <div class="glow violet"></div>
        <div class="main-head">
          <div>
            <h1 class="title" id="pageTitle">Профиль</h1>
            <div class="subtitle" id="pageSub">Новые вкладки, умная подгрузка и полный обзор.</div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
            <button id="btnMarkAllRead" class="btn btn-ghost" type="button" style="display:none;">Прочитать всё</button>
          </div>
        </div>

        <div class="content" id="view"></div>
      </main>
    </div>
  </div>

<script>
  /* =========================
     CONFIG + HELPERS
  ========================= */
  function apiBase(){
    const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    return isLocal ? "http://localhost:3000" : "https://world-script-api.onrender.com";
  }
  function getToken(){ return localStorage.getItem("ws_token") || ""; }

  function formatNum(v){ return new Intl.NumberFormat("ru-RU").format(Number(v||0)); }
  function safeDate(value){
    if(!value) return "—";
    const d = new Date(value);
    if(Number.isNaN(d.getTime())) return "—";
    return d.toLocaleString("ru-RU");
  }
  function h(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function showError(text){
    const box = document.getElementById("errorBox");
    box.style.display = "block";
    box.textContent = String(text || "Ошибка");
  }
  function clearError(){
    const box = document.getElementById("errorBox");
    box.style.display = "none";
    box.textContent = "";
  }

  async function apiGet(path){
    const token = getToken();
    if(!token) throw new Error("Нет ws_token. Сначала войди в аккаунт.");
    const resp = await fetch(apiBase()+path, {
      method:"GET",
      headers:{ "Authorization": "Bearer " + token }
    });
    const text = await resp.text();
    let json = null;
    try{ json = JSON.parse(text); }catch{
      throw new Error(`Сервер вернул не JSON (${resp.status}) для ${path}`);
    }
    if(!resp.ok || !json?.ok){
      throw new Error(json?.error || `Ошибка запроса ${path} (${resp.status})`);
    }
    return json;
  }

  async function apiPost(path, body){
    const token = getToken();
    if(!token) throw new Error("Нет ws_token. Сначала войди в аккаунт.");
    const resp = await fetch(apiBase()+path, {
      method:"POST",
      headers:{
        "Authorization": "Bearer " + token,
        "Content-Type":"application/json",
        "Accept":"application/json"
      },
      body: JSON.stringify(body || {})
    });
    const text = await resp.text();
    let json = null;
    try{ json = JSON.parse(text); }catch{
      throw new Error(`Сервер вернул не JSON (${resp.status}) для ${path}`);
    }
    if(!resp.ok || !json?.ok){
      throw new Error(json?.error || `Ошибка запроса ${path} (${resp.status})`);
    }
    return json;
  }

  const state = {
    me: null,
    binder: null,
    inventory: null,

    dashboard: null,
    contractsBundle: null,
    chestHistory: null,
    pendingTransfers: null,
    autotopup: null,
    progress: null,
    notifications: null,
    notifySettings: null,
    linkCodes: null,
    packages: null,
    paymentActive: null,
    paymentMy: null,

    loaded: new Set()
  };

  function setActiveNav(tab){
    document.querySelectorAll("#nav a").forEach(a=>{
      a.classList.toggle("active", a.dataset.tab === tab);
    });
  }

  function setHeader(title, sub){
    document.getElementById("pageTitle").textContent = title;
    document.getElementById("pageSub").textContent = sub || "";
  }

  function setSidebarUser(user, binder){
    const avatarEl = document.getElementById("avatarEl");
    avatarEl.src = user?.avatar_url || "https://placehold.co/160x160?text=WS";
    avatarEl.onerror = () => avatarEl.src = "https://placehold.co/160x160?text=WS";

    const bannerEl = document.getElementById("bannerEl");
    const bannerUrl = user?.profile_banner_url;
    if(bannerUrl){
      bannerEl.style.backgroundImage = `linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.38)), url('${bannerUrl}')`;
      bannerEl.style.backgroundSize = "cover";
      bannerEl.style.backgroundPosition = "center";
    }else{
      bannerEl.style.backgroundImage = "";
    }

    document.getElementById("meName").textContent =
      user?.nickname || user?.game_nick || user?.login || "Игрок";
    document.getElementById("meSub").textContent = "@" + (user?.login || "unknown");

    const role = String(user?.role || "user").toLowerCase();
    document.getElementById("rolePill").textContent = role === "admin" ? "АДМИНИСТРАТОР" : "ПОЛЬЗОВАТЕЛЬ";

    // badges
    document.getElementById("bWsb").textContent = formatNum(binder?.wsbuild_balance || 0);

    const invCount = Array.isArray(state.inventory)
      ? state.inventory.reduce((s,x)=> s + Number(x.count||0), 0)
      : 0;
    document.getElementById("bInv").textContent = formatNum(invCount);
  }

  function renderLoading(){
    return `
      <div class="grid">
        <div class="tile skeleton" style="grid-column: span 6"></div>
        <div class="tile skeleton" style="grid-column: span 6"></div>
        <div class="tile skeleton" style="grid-column: span 4"></div>
        <div class="tile skeleton" style="grid-column: span 4"></div>
        <div class="tile skeleton" style="grid-column: span 4"></div>
      </div>
    `;
  }

  /* =========================
     LOADERS (lazy)
  ========================= */

  async function loadCore(){
    // Нужен для сайдбара, почти всем вкладкам полезен
    if(state.loaded.has("core")) return;

    // КРИТИЧНО: должен существовать /api/ws/profile-full
    const profile = await apiGet("/api/ws/profile-full");
    state.me = profile.user || null;
    state.binder = profile.binder || null;
    state.inventory = Array.isArray(profile.inventory) ? profile.inventory : [];

    setSidebarUser(state.me, state.binder);
    state.loaded.add("core");
  }

  async function loadOverview(){
    await loadCore();
    if(state.loaded.has("overview")) return;

    const [dash, transfers, autotopup] = await Promise.all([
      apiGet("/api/ws/dashboard-bundle"),
      apiGet("/api/ws/balance-transfer/pending"),
      apiGet("/api/ws/wsbuild/autotopup/my")
    ]);

    state.dashboard = dash;
    state.pendingTransfers = transfers;
    state.autotopup = autotopup;

    // notif badge
    document.getElementById("bNotif").textContent = formatNum(dash.notifications_unread_count || 0);

    // contracts badge
    const inProgress = Array.isArray(dash?.contracts_in_progress) ? dash.contracts_in_progress.length : 0;
    document.getElementById("bContracts").textContent = formatNum(inProgress);

    state.loaded.add("overview");
  }

  async function loadContracts(){
    await loadCore();
    if(state.loaded.has("contracts")) return;

    const bundle = await apiGet("/api/ws/contracts/bundle");
    state.contractsBundle = bundle;

    document.getElementById("bContracts").textContent =
      formatNum(Array.isArray(bundle?.in_progress) ? bundle.in_progress.length : 0);

    state.loaded.add("contracts");
  }

  async function loadInventory(){
    await loadCore();
    // inventory уже есть из profile-full, но оставим вкладку как “loaded”
    state.loaded.add("inventory");
  }

  async function loadProgress(){
    await loadCore();
    if(state.loaded.has("progress")) return;
    state.progress = await apiGet("/api/ws/profile/progress");
    document.getElementById("bLvl").textContent = formatNum(state.progress?.profile?.level || 1);
    state.loaded.add("progress");
  }

  async function loadNotifications(){
    await loadCore();
    if(state.loaded.has("notifications")) return;
    state.notifications = await apiGet("/api/ws/notifications?limit=60");
    state.loaded.add("notifications");
  }

  async function loadWsbuild(){
    await loadCore();
    if(state.loaded.has("wsbuild")) return;

    const [pkgs, active, my, autotopup] = await Promise.all([
      apiGet("/api/ws/wsbuild/packages"),
      apiGet("/api/ws/payment-requests/active"),
      apiGet("/api/ws/payment-requests/my"),
      apiGet("/api/ws/wsbuild/autotopup/my")
    ]);

    state.packages = pkgs;
    state.paymentActive = active;
    state.paymentMy = my;
    state.autotopup = autotopup;

    state.loaded.add("wsbuild");
  }

  async function loadSettings(){
    await loadCore();
    if(state.loaded.has("settings")) return;

    const [settings, linkCodes] = await Promise.all([
      apiGet("/api/ws/notify/settings"),
      apiGet("/api/ws/profile/link-codes")
    ]);

    state.notifySettings = settings;
    state.linkCodes = linkCodes;

    state.loaded.add("settings");
  }

  /* =========================
     RENDER VIEWS
  ========================= */

  function renderOverview(){
    const u = state.me || {};
    const b = state.binder || {};
    const dash = state.dashboard || {};
    const transfers = state.pendingTransfers || {};
    const auto = state.autotopup || {};

    const invCount = Array.isArray(state.inventory)
      ? state.inventory.reduce((s,x)=> s + Number(x.count||0), 0)
      : 0;

  function renderContracts(){

    const completed = Array.isArray(b.completed) ? b.completed : [];
    const expired = Array.isArray(b.expired) ? b.expired : [];

    const renderCard = (c, actionHtml="") => `
      <div class="feed-item">
        <div class="a">${h(c.title || "Контракт")} <span class="muted">• ${"★".repeat(Math.max(1, Math.min(5, Number(c.difficulty||1))))}</span></div>

        <div class="tile" style="grid-column: span 12; min-height: auto">
          <div class="k">В работе</div>

  /* =========================
     ROUTER / TAB ENGINE
  ========================= */
  function getCurrentTab(){
    const tab = (location.hash || "#overview").replace("#","");
    return tab || "overview";
  }

  async function openTab(tab, silent=false){
    const view = document.getElementById("view");
    const btnAllRead = document.getElementById("btnMarkAllRead");

    btnAllRead.style.display = (tab === "notifications") ? "inline-flex" : "none";

    setActiveNav(tab);
    if(!silent) clearError();

    view.innerHTML = renderLoading();

    try{
      if(tab === "overview"){
        setHeader("Обзор", "Баланс, активность, отложенные переводы, онлайн.");
        await loadOverview();
        view.innerHTML = renderOverview();
      } else if(tab === "contracts"){
        setHeader("Контракты", "Доступные и твои контракты + быстрые действия.");
        await loadContracts();
        view.innerHTML = renderContracts();
      } else if(tab === "inventory"){
        setHeader("Инвентарь", "Все предметы, редкость, количество.");
        await loadInventory();
        view.innerHTML = renderInventory();
      } else if(tab === "progress"){
        setHeader("Прогресс", "Уровень, достижения, рекорды.");
        await loadProgress();
        view.innerHTML = renderProgress();
      } else if(tab === "notifications"){
        setHeader("Уведомления", "Лента уведомлений и управление прочитанным.");
        await loadNotifications();
        view.innerHTML = renderNotifications();
      } else if(tab === "wsbuild"){
        setHeader("WSBuild / Платежи", "Заявки, пакеты, автопополнение.");
        await loadWsbuild();
        view.innerHTML = renderWsbuild();
      } else if(tab === "settings"){
        setHeader("Настройки", "Уведомления, коды привязки, безопасность.");
        await loadSettings();
        view.innerHTML = renderSettings();
      } else {
        location.hash = "#overview";
      }
    }catch(e){
      showError(e.message || e);
      view.innerHTML = `<div class="muted">Не удалось загрузить вкладку. Проверь токен/эндпоинты.</div>`;
    }
  }

  // Expose actions
  window.takeContract = takeContract;
  window.readNotif = readNotif;
  window.readAllNotifs = readAllNotifs;
  window.createPay = createPay;
  window.markPaid = markPaid;
  window.cancelPay = cancelPay;
  window.toggleSetting = toggleSetting;
  window.saveNotifySettings = saveNotifySettings;
  window.genCode = genCode;
  window.uploadAvatar = uploadAvatar;
  window.uploadBanner = uploadBanner;
  window.clearBanner = clearBanner;
  window.changePassword = changePassword;

  /* =========================
     BOOT
  ========================= */
  document.getElementById("btnReload").addEventListener("click", async ()=>{
    state.loaded.clear();
    await openTab(getCurrentTab());
  });

  document.getElementById("btnLogout").addEventListener("click", ()=>{
    localStorage.removeItem("ws_token");
    location.href = "index.html";
  });

  document.getElementById("btnMarkAllRead").addEventListener("click", readAllNotifs);

  window.addEventListener("hashchange", ()=> openTab(getCurrentTab()));

  openTab(getCurrentTab());
</script>
</body>
</html>
