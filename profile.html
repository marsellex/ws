<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Профиль пользователя</title>

  <link rel="icon" href="ws_logo.ico" type="image/x-icon">
  <link rel="shortcut icon" href="ws_logo.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="ws_logo.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --txt: rgba(245,248,255,.96);
      --muted: rgba(215,230,255,.66);
      --muted2: rgba(215,230,255,.46);
      --stroke: rgba(140,170,255,.16);
      --stroke-strong: rgba(140,170,255,.24);
      --accent1:#3d7dff;
      --accent2:#7c3aed;
      --glow:#ff64d7;
      --danger:#ff5a7a;
      --success:#41d68a;
      --gold:#ffcf66;
      --cardA: rgba(12,18,40,.84);
      --cardB: rgba(7,12,30,.94);
      --r16:16px;
      --r22:22px;
      --r28:28px;
      --shadow: 0 28px 90px rgba(0,0,0,.44);
      --shadowSoft: 0 16px 52px rgba(0,0,0,.28);
      --sidebarW: 308px;
      --pageBgBlurPx: 0px;
      --pageBgOpacity: 0.55;
      --anim: cubic-bezier(.22,.74,0,1);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      font-family: Inter, system-ui, Arial, sans-serif;
      color: var(--txt);
      background:
        radial-gradient(circle at 10% 0%, rgba(61,125,255,.10), transparent 32%),
        radial-gradient(circle at 90% 0%, rgba(124,58,237,.10), transparent 34%),
        linear-gradient(180deg, #020411, #01030c);
      overflow-x:hidden;
    }

    .page-bg{
      position:fixed;
      inset:-50px;
      z-index:-5;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      transform: scale(1.08);
      opacity: var(--pageBgOpacity);
      filter: blur(var(--pageBgBlurPx));
      transition: filter .45s var(--anim), opacity .45s var(--anim), background-image .3s ease;
    }
    .page-bg-overlay{
      position:fixed;
      inset:0;
      z-index:-4;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 14%, color-mix(in oklab, var(--accent1) 18%, transparent), transparent 34%),
        radial-gradient(circle at 82% 10%, color-mix(in oklab, var(--accent2) 16%, transparent), transparent 36%),
        radial-gradient(circle at 50% 100%, color-mix(in oklab, var(--glow) 12%, transparent), transparent 38%),
        linear-gradient(180deg, rgba(2,4,17,.76), rgba(1,3,12,.92));
    }
    .bg-grid{
      position:fixed; inset:0; pointer-events:none; opacity:.05;
      z-index:-3;
      background-image:
        linear-gradient(rgba(120,160,255,.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,160,255,.28) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.85), transparent 85%);
      -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,.85), transparent 85%);
      animation: gridFloat 22s linear infinite;
    }
    @keyframes gridFloat{ from{ transform:translate3d(0,0,0);} to{ transform:translate3d(32px,32px,0);} }

    .bg-orbs{ position:fixed; inset:0; pointer-events:none; z-index:-2; overflow:hidden; }
    .orb{
      position:absolute; border-radius:50%; filter: blur(80px); opacity:.28;
      animation: orbDrift 18s ease-in-out infinite;
    }
    .orb.o1{ width:340px; height:340px; top:6%; left:3%; background:rgba(61,125,255,.28); }
    .orb.o2{ width:280px; height:280px; top:16%; right:8%; background:rgba(124,58,237,.28); animation-delay:-6s; }
    .orb.o3{ width:240px; height:240px; bottom:8%; left:28%; background:rgba(255,100,215,.20); animation-delay:-10s; }
    @keyframes orbDrift{
      0%,100%{ transform:translate3d(0,0,0) scale(1); }
      30%{ transform:translate3d(18px,-20px,0) scale(1.06); }
      60%{ transform:translate3d(-14px,16px,0) scale(.96); }
    }

    .app{
      max-width: 1560px;
      margin: 0 auto;
      padding: 16px 16px 28px;
      display:grid;
      grid-template-columns: var(--sidebarW) 1fr;
      gap: 14px;
      align-items:start;
      animation: pageIn .34s var(--anim) both;
    }
    @keyframes pageIn{ from{opacity:.72; transform: translateY(10px);} to{opacity:1; transform:none;} }

    .glass{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadowSoft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .sidebar{
      position: sticky;
      top: 14px;
      height: calc(100vh - 28px);
      border-radius: 26px;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 0%, color-mix(in oklab, var(--accent1) 22%, transparent), transparent 52%),
        radial-gradient(circle at 85% 10%, color-mix(in oklab, var(--accent2) 18%, transparent), transparent 58%),
        rgba(255,255,255,.03);
      border: 1px solid rgba(140,170,255,.14);
      box-shadow: var(--shadowSoft);
      display:flex;
      flex-direction:column;
      transition: transform .28s var(--anim), border-color .28s var(--anim), box-shadow .28s var(--anim);
    }
    .sidebar:hover{
      border-color: rgba(140,170,255,.18);
      box-shadow: 0 24px 70px rgba(0,0,0,.30);
    }

    .side-top{
      padding: 14px 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .me{ display:flex; gap: 12px; align-items:center; }
    .me-ava{
      width:56px; height:56px;
      border-radius: 16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      flex:none;
      box-shadow: 0 10px 24px rgba(0,0,0,.20);
    }
    .me-ava img{ width:100%; height:100%; object-fit:cover; display:block; }
    .me-meta{ min-width:0; }
    .me-login{
      font-weight: 950;
      letter-spacing:-.02em;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .me-nick{
      margin-top:4px;
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .me-role{
      margin-top:10px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height: 28px;
      padding: 0 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      font-weight: 950;
      font-size: 12px;
      letter-spacing:.08em;
      text-transform: uppercase;
    }

    .side-actions{ display:flex; gap: 10px; margin-top: 12px; flex-wrap:wrap; }
    .btn{
      appearance:none;
      border:1px solid rgba(140,170,255,.20);
      background: linear-gradient(180deg, rgba(18,31,67,.90), rgba(10,19,46,.95));
      color:#fff;
      padding: 12px 14px;
      border-radius: 16px;
      font-weight: 900;
      letter-spacing: .01em;
      cursor:pointer;
      transition: transform .22s var(--anim), border-color .22s var(--anim), box-shadow .22s var(--anim), background .22s var(--anim), opacity .2s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 18px 42px rgba(0,0,0,.18);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height: 42px;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .btn::after{
      content:"";
      position:absolute; top:0; left:-140%; width:60%; height:100%;
      transform: skewX(-24deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.16), transparent);
      opacity:0;
    }
    .btn:hover{ transform: translateY(-2px); border-color: rgba(140,170,255,.34); }
    .btn:hover::after{ opacity:1; animation: btnShine .7s ease; }
    .btn:disabled{ opacity:.58; cursor:default; transform:none !important; }
    @keyframes btnShine{ from{ left:-140%; } to{ left:155%; } }
    .btn.primary{
      background: linear-gradient(180deg, var(--accent1) 0%, color-mix(in oklab, var(--accent1) 55%, #000) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 18px 42px rgba(61,125,255,.24);
    }
    .btn.ghost{
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .btn.danger{
      background: linear-gradient(180deg, rgba(255,90,122,.35), rgba(140,20,60,.35));
      border-color: rgba(255,90,122,.22);
    }
    .btn.small{ min-height: 36px; padding: 10px 12px; border-radius: 14px; }

    .nav{
      padding: 12px 10px 12px;
      display:flex;
      flex-direction:column;
      gap: 6px;
      overflow:auto;
    }
    .nav-btn{
      width: 100%;
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.88);
      cursor:pointer;
      text-align:left;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 12px 12px;
      border-radius: 16px;
      position:relative;
      transition: transform .2s var(--anim), opacity .2s ease;
      user-select:none;
      font-weight: 900;
    }
    .nav-btn::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius: 16px;
      background:
        radial-gradient(circle at 18% 0%, color-mix(in oklab, var(--accent1) 22%, transparent), transparent 55%),
        radial-gradient(circle at 90% 0%, color-mix(in oklab, var(--accent2) 18%, transparent), transparent 60%),
        rgba(255,255,255,.03);
      opacity: 0;
      transition: opacity .22s var(--anim), border-color .22s var(--anim), box-shadow .22s var(--anim);
      border: 1px solid rgba(255,255,255,.08);
    }
    .nav-btn::after{
      content:"";
      position:absolute;
      left: 6px;
      top: 10px;
      bottom: 10px;
      width: 3px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent1), var(--accent2));
      opacity: 0;
      transform: scaleY(.6);
      transition: opacity .22s var(--anim), transform .22s var(--anim);
    }
    .nav-btn:hover{ transform: translateY(-1px); }
    .nav-btn:hover::before{
      opacity: 1;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      border-color: rgba(140,170,255,.14);
    }
    .nav-btn.active::before{
      opacity: 1;
      border-color: rgba(120,160,255,.22);
      background: linear-gradient(180deg, color-mix(in oklab, var(--accent1) 26%, transparent), rgba(255,255,255,.03));
    }
    .nav-btn.active::after{ opacity: 1; transform: scaleY(1); }

    .nav-left{ display:flex; align-items:center; gap:10px; min-width:0; position:relative; z-index:1; }
    .nav-ico{
      width: 26px; height: 26px; border-radius: 10px;
      display:inline-flex; align-items:center; justify-content:center;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      flex:none;
    }
    .nav-label{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .badge{
      position:relative; z-index:1;
      min-width: 24px; height: 22px; padding: 0 8px;
      border-radius: 999px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size: 12px; font-weight: 950;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      color:#fff; flex:none;
    }
    .badge.red{ background: rgba(255,90,122,.28); border-color: rgba(255,90,122,.24); }
    .badge.blue{ background: rgba(61,125,255,.28); border-color: rgba(120,160,255,.22); }

    .side-footer{
      margin-top:auto;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:flex-end;
      min-height: 44px;
    }
    .spinner{
      width:16px; height:16px; border-radius: 999px;
      border: 2px solid rgba(255,255,255,.18);
      border-top-color: var(--accent1);
      animation: spin .9s linear infinite;
      opacity: 0;
      transition: opacity .15s ease;
    }
    .spinner.on{ opacity: 1; }
    @keyframes spin{ to { transform: rotate(360deg); } }

    .main{ min-width:0; }
    .hero{
      position:relative;
      border-radius: var(--r28);
      overflow:hidden;
      border: 1px solid rgba(140,170,255,.18);
      background:
        radial-gradient(circle at 20% 0%, color-mix(in oklab, var(--accent1) 24%, transparent), transparent 45%),
        radial-gradient(circle at 80% 0%, color-mix(in oklab, var(--accent2) 20%, transparent), transparent 45%),
        linear-gradient(180deg, rgba(10,18,42,.92), rgba(5,10,26,.96));
      box-shadow: var(--shadow);
      isolation:isolate;
    }
    .hero::before{
      content:"";
      position:absolute; inset:0;
      border-radius: var(--r28);
      padding:1px;
      background: linear-gradient(90deg,
        color-mix(in oklab, var(--accent1) 95%, #fff 0%),
        color-mix(in oklab, var(--accent2) 78%, #fff 0%),
        color-mix(in oklab, var(--glow) 40%, transparent)
      );
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      opacity:.55;
      pointer-events:none;
    }
    .hero::after{
      content:"";
      position:absolute; inset:auto -12% -48% auto;
      width:320px; height:320px; border-radius:50%;
      background: radial-gradient(circle, color-mix(in oklab, var(--glow) 18%, transparent), transparent 68%);
      filter: blur(10px);
      opacity:.65;
      pointer-events:none;
      z-index:0;
    }

    .hero-banner{
      height: 220px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.75)),
        radial-gradient(circle at 30% 40%, rgba(255,255,255,.08), transparent 50%),
        linear-gradient(90deg, rgba(61,125,255,.25), rgba(124,58,237,.20));
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid rgba(255,255,255,.08);
      position:relative;
      overflow:hidden;
    }
    .hero-banner::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
      transform: translateX(-100%);
      animation: heroSheen 9s ease-in-out infinite;
      opacity:.55;
    }
    @keyframes heroSheen{ 0%,65%,100%{ transform:translateX(-100%);} 82%{ transform:translateX(120%);} }

    .hero-top{
      display:flex;
      justify-content:space-between;
      gap: 18px;
      padding: 16px 18px 8px;
      margin-top: -62px;
      position:relative;
      z-index: 1;
    }
    .hero-left{ display:flex; gap:14px; align-items:center; min-width:0; }

    .level-badge{
      --fill: 30%;
      --tierA: rgba(61,125,255,.85);
      --tierB: rgba(124,58,237,.75);
      position:relative;
      width: 92px;
      height: 92px;
      border-radius: 22px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 18px 52px rgba(0,0,0,.38);
      flex:none;
      transition: transform .24s var(--anim), box-shadow .24s var(--anim);
    }
    .level-badge:hover{ transform: translateY(-2px); box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 22px 60px rgba(0,0,0,.42); }
    .level-badge::after{
      content:"";
      position:absolute; inset:0;
      border-radius: 22px;
      padding:1px;
      background: linear-gradient(90deg, var(--tierA), var(--tierB), color-mix(in oklab, var(--glow) 40%, transparent));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      opacity:.55;
      pointer-events:none;
    }
    .water{
      position:absolute; left:0; right:0; bottom:0;
      height: var(--fill);
      background: linear-gradient(180deg,
        color-mix(in oklab, var(--tierA) 55%, #000),
        color-mix(in oklab, var(--tierB) 40%, #000)
      );
      box-shadow: 0 -16px 40px color-mix(in oklab, var(--tierA) 34%, transparent);
      transition: height .42s var(--anim);
    }
    .wave{
      position:absolute; left:-20%; width:140%; height: 24px;
      bottom: calc(var(--fill) - 12px);
      background:
        radial-gradient(circle at 10px 12px, rgba(255,255,255,.22) 0 10px, transparent 11px),
        radial-gradient(circle at 34px 10px, rgba(255,255,255,.14) 0 10px, transparent 11px);
      background-size: 44px 24px;
      opacity:.55; filter: blur(.2px);
      animation: waveMove 2.2s linear infinite;
      transition: bottom .42s var(--anim);
    }
    @keyframes waveMove{ from{ transform: translateX(0); } to{ transform: translateX(-44px);} }
    .level-content{
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
      z-index:2; text-shadow: 0 10px 30px rgba(0,0,0,.55);
    }
    .level-label{ font-weight: 950; letter-spacing: .12em; font-size: 11px; opacity:.9; }
    .level-num{ margin-top:4px; font-weight: 950; font-size: 26px; letter-spacing: -0.03em; }

    .hero-id{ min-width:0; }
    .hero-login{
      font-weight: 950;
      letter-spacing: -0.05em;
      font-size: clamp(30px, 3.2vw, 62px);
      line-height: 1;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .hero-name{
      margin-top: 10px;
      color: rgba(215,230,255,.70);
      font-weight: 850;
      font-size: 16px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .hero-pills{ display:flex; flex-wrap:wrap; gap:10px; margin-top: 12px; }
    .pill{
      display:inline-flex; align-items:center; justify-content:center;
      min-height: 34px; padding: 0 14px; border-radius: 999px;
      border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.06);
      font-weight: 950; font-size: 12px; letter-spacing: .08em;
      text-transform: uppercase; color: rgba(255,255,255,.90);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .pill.role{
      background: linear-gradient(180deg, rgba(124,58,237,.35), rgba(61,125,255,.20));
      border-color: rgba(140,170,255,.24);
    }
    .hero-right{ text-align:right; padding-top: 42px; flex:none; }
    .hero-rating-value{ margin-top: 6px; font-weight: 950; font-size: 36px; letter-spacing: -0.03em; }

    .hero-xp{ padding: 6px 18px 14px; position:relative; z-index:1; }
    .hero-xp-row{ display:flex; justify-content:space-between; gap: 12px; flex-wrap:wrap; align-items:flex-end; }
    .hero-xp-text{ font-weight: 950; font-size: 18px; }
    .hero-xp-next{ color: rgba(215,230,255,.62); font-weight: 850; font-size: 14px; }
    .xp-bar{
      height: 14px; border-radius: 999px; overflow:hidden;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.10);
      margin-top: 12px; position:relative;
    }
    .xp-fill{
      height:100%; width:0%;
      background: linear-gradient(90deg,
        color-mix(in oklab, var(--accent1) 90%, #fff),
        color-mix(in oklab, var(--accent2) 75%, #fff),
        color-mix(in oklab, var(--glow) 55%, transparent)
      );
      box-shadow: 0 0 18px rgba(79,141,255,.30);
      transition: width .38s var(--anim);
    }
    .hero-stats{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
      padding: 0 18px 18px;
      position:relative;
      z-index:1;
    }
    .stat{
      border-radius: 18px;
      padding: 14px;
      border:1px solid rgba(140,170,255,.14);
      background: linear-gradient(180deg, rgba(6,16,41,.76), rgba(4,10,27,.96));
      min-height: 92px;
      transition: transform .22s var(--anim), border-color .22s var(--anim), box-shadow .22s var(--anim);
      position:relative;
      overflow:hidden;
    }
    .stat::before{
      content:""; position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(255,255,255,.05), transparent 50%);
      pointer-events:none;
    }
    .stat:hover{ transform: translateY(-2px); border-color: rgba(140,170,255,.22); box-shadow: 0 22px 60px rgba(0,0,0,.28); }
    .stat .k{ color: rgba(215,230,255,.58); font-weight: 850; font-size: 12px; text-transform: uppercase; letter-spacing: .12em; }
    .stat .v{ margin-top: 10px; font-weight: 950; font-size: 28px; }

    .content{
      margin-top: 14px;
      border-radius: var(--r28);
      border: 1px solid rgba(140,170,255,.16);
      background: linear-gradient(135deg, rgba(17,29,63,.84), rgba(8,16,40,.94));
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      min-height: 220px;
    }
    .content::before{
      content:""; position:absolute; inset:0;
      background: radial-gradient(circle at 100% 0%, rgba(255,255,255,.04), transparent 30%);
      pointer-events:none;
    }
    .content-head{
      padding: 18px 18px 0;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      position:relative;
      z-index:1;
    }
    .h-title{ margin:0; font-size: clamp(22px, 2.0vw, 32px); font-weight: 950; letter-spacing: -0.03em; }
    .content-body{ padding: 16px 18px 18px; position:relative; z-index:1; }

<script>
const urlParams = new URLSearchParams(location.search);
const viewUserId = Number(urlParams.get("user_id") || 0);
let isPublicView = false;
let myUserId = 0;

function apiBase(){
  const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
  return isLocal ? "http://localhost:3000" : "https://world-script-api.onrender.com";
}
function getToken(){ return localStorage.getItem("ws_token") || ""; }
function formatNum(v){ return new Intl.NumberFormat("ru-RU").format(Number(v||0)); }
function safeDate(value){
  if(!value) return "—";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return "—";
  return d.toLocaleString("ru-RU");
}
function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function toast(text){
  const el = document.getElementById("toast");
  el.textContent = String(text||"");
  el.style.display = "block";
  clearTimeout(window.__toast_t);
  window.__toast_t = setTimeout(()=> el.style.display = "none", 3500);
}
function widgetError(text){ return `<div class="widget-error">${esc(text)}</div>`; }
function resolveImg(src, fallback = "https://placehold.co/160x160?text=WS"){
  const value = String(src || "").trim();
  return value || fallback;
}
function roleLabel(role){
  return String(role || "user").toLowerCase() === "admin" ? "АДМИНИСТРАТОР" : "ПОЛЬЗОВАТЕЛЬ";
}

let loadingCount = 0;
function setLoading(on){
  const spin = document.getElementById("spin");
  if(on) loadingCount++;
  else loadingCount = Math.max(0, loadingCount - 1);
  spin.classList.toggle("on", loadingCount > 0);
}

function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }
function isRetryableError(err){
  const status = Number(err?.status || 0);
  if ([400,401,403,404].includes(status)) return false;
  if ([408,425,429,500,502,503,504].includes(status)) return true;
  const msg = String(err?.message || "").toLowerCase();
  if (msg.includes("failed to fetch")) return true;
  if (msg.includes("таймаут") || msg.includes("timeout")) return true;
  return false;
}
function calcBackoff(attempt, base=650, cap=8000){
  const exp = Math.min(cap, Math.round(base * Math.pow(1.6, attempt - 1)));
  const jitter = Math.round(exp * (Math.random() * 0.25));
  return Math.min(cap, exp + jitter);
}
async function withRetry(task, { maxAttempts=5 } = {}){
  let attempt = 0;
  while(true){
    attempt++;
    try{ return await task(); }
    catch(err){
      if(!isRetryableError(err) || attempt >= maxAttempts) throw err;
      await sleep(calcBackoff(attempt));
    }
  }
}

async function fetchJson(path, {method="GET", body=null, timeoutMs=15000} = {}){
  const token = getToken();
  if(!token){
    const e = new Error("Требуется вход");
    e.status = 401; e.path = path;
    throw e;
  }
  const ctrl = new AbortController();
  const t = setTimeout(()=> ctrl.abort(), timeoutMs);
  setLoading(true);
  try{
    const resp = await fetch(apiBase()+path, {
      method,
      headers:{
        "Authorization":"Bearer "+token,
        "Accept":"application/json",
        ...(method!=="GET" ? {"Content-Type":"application/json"} : {})
      },
      body: body ? JSON.stringify(body) : null,
      signal: ctrl.signal
    });
    const text = await resp.text();
    let json = null;
    try { json = JSON.parse(text); } catch { json = null; }
    if(!json){
      const e = new Error("Ошибка");
      e.status = resp.status; e.path = path;
      throw e;
    }
    if(!resp.ok || !json.ok){
      const e = new Error(String(json.error || "Ошибка"));
      e.status = resp.status; e.path = path; e.payload = json;
      throw e;
    }
    return json;
  } catch(err){
    if(err?.name === "AbortError"){
      const e = new Error("Время ожидания истекло");
      e.status = 408; e.path = path;
      throw e;
    }
    if(err instanceof TypeError && String(err.message).includes("Failed to fetch")){
      const e = new Error("Не удалось загрузить");
      e.status = 503; e.path = path;
      throw e;
    }
    throw err;
  } finally {
    clearTimeout(t);
    setLoading(false);
  }
}
async function apiGet(path){ return withRetry(()=>fetchJson(path, {method:"GET"}), { maxAttempts: 5 }); }
async function apiPost(path, body){ return fetchJson(path, {method:"POST", body}); }

async function compressToDataURL(file, {maxW=1920, maxH=1080, mime="image/jpeg", quality=0.82} = {}){
  const bmp = await createImageBitmap(file);
  let w = bmp.width, h = bmp.height;
  const r = Math.min(maxW / w, maxH / h, 1);
  w = Math.round(w*r); h = Math.round(h*r);
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  const ctx = c.getContext("2d");
  ctx.drawImage(bmp, 0, 0, w, h);
  return c.toDataURL(mime, quality);
}

function modalOpen(title, html){
  document.getElementById("modalTitle").textContent = title || "";
  document.getElementById("modalBody").innerHTML = html || "";
  document.getElementById("modalBackdrop").style.display = "flex";
}
function modalClose(){
  document.getElementById("modalBackdrop").style.display = "none";
  document.getElementById("modalBody").innerHTML = "";
}
document.getElementById("modalClose").addEventListener("click", modalClose);
document.getElementById("modalBackdrop").addEventListener("click", (e)=>{ if(e.target.id === "modalBackdrop") modalClose(); });

const THEME_KEY = "ws_profile_theme_min_v2";
let themeDraft = (()=>{ try { return JSON.parse(localStorage.getItem(THEME_KEY) || "null"); } catch { return null; } })() || { accent1:"#3d7dff", accent2:"#7c3aed", glow:"#ff64d7" };
function applyTheme(t){
  const s = document.documentElement.style;
  if(t.accent1) s.setProperty("--accent1", t.accent1);
  if(t.accent2) s.setProperty("--accent2", t.accent2);

function applyPageBg({image_url="", blur=0, opacity=55} = {}){
  const el = document.getElementById("pageBg");
  const blurPx = Math.round((Number(blur||0) / 100) * 36);
  document.documentElement.style.setProperty("--pageBgBlurPx", blurPx + "px");
  document.documentElement.style.setProperty("--pageBgOpacity", (Number(opacity||55) / 100).toFixed(2));
  el.style.backgroundImage = image_url ? `url('${image_url}')` : "none";
}

function getLevelTier(level){
  const lvl = Math.max(1, Number(level||1));
  if(lvl >= 50) return { a:"#ffb86b", b:"#ff64d7" };
  if(lvl >= 35) return { a:"#7c3aed", b:"#3d7dff" };
  if(lvl >= 25) return { a:"#3d7dff", b:"#27d6ff" };
  if(lvl >= 15) return { a:"#1bd760", b:"#3d7dff" };
  if(lvl >= 8)  return { a:"#ffcc66", b:"#7c3aed" };
  return { a:"#3d7dff", b:"#7c3aed" };
}
function normalizeInventory(items){
  const arr = Array.isArray(items) ? items : [];
  return arr.map(x=>{
    const obj = x.object || x.ws_object || {};
    return {
      object_id: Number(x.object_id || 0),
      count: Number(x.count || 0),
      title: String(x.title || obj.title || "Предмет"),
      rarity: String(x.rarity || obj.rarity || "Обычный"),
      image_url: String(x.image_url || obj.image_url || "")
    };
  });
}

function applyHero(dash, prog){
  const user = dash?.user || {};
  const binder = dash?.binder || {};
  const inv = normalizeInventory(dash?.inventory || []);
  const invCount = inv.reduce((s,x)=>s+Number(x.count||0),0);

  const meAvatar = document.getElementById("meAvatar");
  meAvatar.src = resolveImg(user.avatar_url);
  meAvatar.onerror = ()=> meAvatar.src = "https://placehold.co/160x160?text=WS";

  document.getElementById("meLogin").textContent = user.login || "unknown";
  document.getElementById("meNick").textContent = user.game_nick || user.nickname || "—";
  document.getElementById("meRole").textContent = roleLabel(user.role);

  const banner = document.getElementById("heroBanner");
  if(user.profile_banner_url){
    banner.style.backgroundImage = `linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.78)), url('${user.profile_banner_url}')`;
    banner.style.backgroundSize = "cover";
    banner.style.backgroundPosition = "center";
  } else {
    banner.style.backgroundImage = "";
  }

  document.getElementById("heroLogin").textContent = user.login || "unknown";
  document.getElementById("heroName").textContent = user.game_nick || user.nickname || user.login || "—";
  document.getElementById("heroRole").textContent = roleLabel(user.role);
  document.getElementById("heroVk").textContent = user.vk_id ? `VK: ${user.vk_id}` : "VK: —";
  document.getElementById("heroNick").textContent = user.game_nick ? `NICK: ${user.game_nick}` : "NICK: —";

  const capital = Number(binder.game_balance||0) + Number(binder.to_output||0);
  document.getElementById("heroRank").textContent = capital >= 100000 ? "CORE" : "INIT";

  const totalXp = Number(prog?.profile?.total_xp ?? 0);
  const rating = totalXp > 0 ? Math.round(totalXp / 10) : Math.round(capital / 100);
  document.getElementById("heroRating").textContent = formatNum(rating);

  document.getElementById("heroBal").textContent = isPublicView ? "—" : formatNum(binder.game_balance||0);
  document.getElementById("heroOut").textContent = isPublicView ? "—" : formatNum(binder.to_output||0);
  document.getElementById("heroWsb").textContent = isPublicView ? "—" : formatNum(binder.wsbuild_balance||0);
  document.getElementById("heroInv").textContent = isPublicView ? "—" : formatNum(invCount);

  document.getElementById("bdWsb").textContent = isPublicView ? "—" : formatNum(binder.wsbuild_balance || 0);
  document.getElementById("bdInv").textContent = isPublicView ? "—" : formatNum(invCount);
  document.getElementById("bdNotif").textContent = isPublicView ? "0" : formatNum(dash.notifications_unread_count || 0);
  document.getElementById("bdContracts").textContent = isPublicView ? "—" : String((dash.contracts_in_progress||[]).length);

  const lvl = Number(prog?.profile?.level || 1);
  const xp = Number(prog?.profile?.xp || 0);
  const toNext = Number(prog?.profile?.xp_to_next || 100);
  const pct = Math.max(0, Math.min(100, Number(prog?.profile?.progress_percent || 0)));

  document.getElementById("bdLvl").textContent = String(lvl);
  document.getElementById("levelNum").textContent = String(lvl);
  document.getElementById("heroXpText").textContent = `${formatNum(xp)} / ${formatNum(toNext)}`;
  document.getElementById("heroXpNext").textContent = `${formatNum(Math.max(0, toNext - xp))}`;
  document.getElementById("heroXpFill").style.width = pct + "%";

  const fill = Math.max(10, Math.min(100, pct));
  const badge = document.getElementById("levelBadge");
  badge.style.setProperty("--fill", fill + "%");

  const tier = getLevelTier(lvl);
  badge.style.setProperty("--tierA", tier.a);
  badge.style.setProperty("--tierB", tier.b);
}

async function initProfileMode() {
  const me = await apiGet("/api/ws/me").catch(() => null);
  if (!me?.ok || !me.user?.id) {
    localStorage.removeItem("ws_token");
    location.href = "index.html";
    return false;
  }
  myUserId = Number(me.user.id || 0);
  isPublicView = viewUserId > 0 && viewUserId !== myUserId;

  if (isPublicView) {
    const nav = document.getElementById("nav");
    if (nav) {
      nav.innerHTML = `
        <button class="nav-btn active" data-tab="overview" type="button">
          <span class="nav-left"><span class="nav-ico">👤</span><span class="nav-label">Профиль</span></span>

async function loadCore(force = false){
  if (isPublicView) {
    const pub = await apiGet("/api/ws/users/public/" + viewUserId);
    const dashLike = {
      user: pub.user,
      binder: { game_balance: 0, to_output: 0, wsbuild_balance: 0 },
      inventory: [],
      notifications_unread_count: 0,
      activity_feed: []
    };
    const progLike = { profile: pub.progress, achievements: [] };
    state.core.dash = dashLike;
    state.core.prog = progLike;
    state.core.pageBg = null;
    applyHero(dashLike, progLike);
    return;
  }

  const [dash, prog, bg] = await Promise.all([
    apiGet("/api/ws/dashboard-bundle"),
    apiGet("/api/ws/profile/progress"),
    apiGet("/api/ws/profile/page-bg").catch(()=>null)
  ]);
  state.core.dash = dash;
  state.core.prog = prog;
  state.core.pageBg = bg;
  if (bg) applyPageBg({ image_url: bg.image_url || "", blur: bg.blur ?? 0, opacity: bg.opacity ?? 55 });
  applyHero(dash, prog);
}

                  <div class="m">${formatNum(x.wsbuild_amount||0)} • ${formatNum(x.amount_rub||0)} ₽</div>
                </div>
              </div>
            `).join("") : `<div class="m">История пуста</div>`
          }
        </div>
      </div>
    </div>
  `;
}

let bgDebounceT = null;
async function bgSavePatch(patch){
  clearTimeout(bgDebounceT);
  bgDebounceT = setTimeout(async ()=>{
    try{
      const current = state.core.pageBg || { image_url:"", blur:0, opacity:55 };
      const payload = { blur: patch.blur ?? current.blur ?? 0, opacity: patch.opacity ?? current.opacity ?? 55 };
      const res = await apiPost("/api/ws/profile/page-bg/set", payload);
      state.core.pageBg = res;
      applyPageBg({ image_url: res.image_url || "", blur: res.blur ?? 0, opacity: res.opacity ?? 55 });
    }catch(e){ console.log("bgSavePatch error:", e.message); }
  }, 350);
}

function syncColor(input, textId){
  const el = document.getElementById(textId);
  if (el) el.value = input.value;
}
function syncColorText(input, pickerId){
  const value = String(input.value || "").trim();
  if (!/^#[0-9a-fA-F]{6}$/.test(value)) return;
  const el = document.getElementById(pickerId);
  if (el) el.value = value;
}

async function openTab(tab){
  if (isPublicView && tab !== "overview") tab = "overview";
  setActiveTab(tab);

  document.getElementById("viewTitle").textContent = tab === "overview" ? "Обзор" :
    tab === "contracts" ? "Контракты" :
    tab === "inventory" ? "Инвентарь" :
    tab === "progress" ? "Прогресс" :
    tab === "notifications" ? "Уведомления" :
    tab === "wsbuild" ? "WSBuild" : "Настройки";

  document.getElementById("view").innerHTML = `<div class="widget" style="min-height:220px"></div>`;

  try{
    await loadCore();

    if(tab === "overview"){
      await loadOverview();
      document.getElementById("view").innerHTML = renderOverview();
    }
    else if(tab === "contracts"){
      await loadContracts();
      document.getElementById("view").innerHTML = renderContracts();
    }
    else if(tab === "inventory"){
      document.getElementById("view").innerHTML = renderInventory();
    }
    else if(tab === "progress"){
      document.getElementById("view").innerHTML = renderProgress();
    }
    else if(tab === "notifications"){
      await loadNotifications();
      document.getElementById("view").innerHTML = renderNotifications();
    }
    else if(tab === "wsbuild"){
      await loadWsbuild();
      document.getElementById("view").innerHTML = renderWsbuild();
    }
    else if(tab === "settings"){
      await loadSettings();
      document.getElementById("view").innerHTML = renderSettings();
      bindBgFile();
    }
  }catch(e){
    console.log("openTab error:", e.message);
    toast("Не удалось загрузить данные");
    document.getElementById("view").innerHTML = widgetError("Недоступно");
  }
}

async function genCode(type){
  try{
    if(type==="link") await apiPost("/api/ws/profile/generate-link-code", {});
    if(type==="vk") await apiPost("/api/ws/profile/generate-vk-link-code", {});
    if(type==="nick") await apiPost("/api/ws/profile/generate-nick-link-code", {});
    toast("Код обновлён");
    openTab("settings");
  }catch(e){ console.log("genCode error:", e.message); }
}

function bgBlur(v){
  const cur = state.core.pageBg || { image_url:"", blur:0, opacity:55 };
  const blur = Math.max(0, Math.min(100, Number(v||0)));
  state.core.pageBg = {...cur, blur};
  applyPageBg({ image_url: cur.image_url || "", blur, opacity: cur.opacity ?? 55 });
  bgSavePatch({ blur });
}
function bgOpacity(v){
  const cur = state.core.pageBg || { image_url:"", blur:0, opacity:55 };
  const opacity = Math.max(0, Math.min(100, Number(v||0)));
  state.core.pageBg = {...cur, opacity};
  applyPageBg({ image_url: cur.image_url || "", blur: cur.blur ?? 0, opacity });
  bgSavePatch({ opacity });
}
async function bgClear(){
  try{
    const res = await apiPost("/api/ws/profile/page-bg/clear", {});
    state.core.pageBg = res;
    applyPageBg({ image_url:"", blur:0, opacity:55 });
    toast("Фон страницы очищен");
    openTab("settings");
  }catch(e){ console.log("bgClear error:", e.message); }
}
function bindBgFile(){
  const input = document.getElementById("bgFile");
  if(!input || input.dataset.bound === "1") return;
  input.dataset.bound = "1";
  input.addEventListener("change", async ()=>{
    try{
      const file = input.files?.[0];
      input.value = "";
      if(!file) return;
      const image_base64 = await compressToDataURL(file);
      const cur = state.core.pageBg || { blur:0, opacity:55 };
      const res = await apiPost("/api/ws/profile/page-bg/set", { image_base64, blur: cur.blur ?? 0, opacity: cur.opacity ?? 55 });
      state.core.pageBg = res;
      applyPageBg({ image_url: res.image_url || "", blur: res.blur ?? 0, opacity: res.opacity ?? 55 });
      toast("Фон обновлён");
      openTab("settings");
    }catch(e){ console.log("bindBgFile error:", e.message); }
  });
}

function openUpload(kind){
  const isAvatar = kind === "avatar";
  modalOpen(isAvatar ? "Обновить аватарку" : "Обновить баннер", `
    <div class="preview">
      <div class="pimg"><img id="upPreview" alt="preview" src="https://placehold.co/300x300?text=PREVIEW"></div>
      <div style="min-width:260px; flex:1;">
        <div class="field">
          <label>Изображение</label>
          <input id="upFile" type="file" accept="image/*">
        </div>
        <div class="switch-sub">Поддерживаются обычные изображения. Перед отправкой файл будет сжат.</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" type="button" onclick="modalClose()">Отмена</button>
      <button class="btn primary" type="button" id="upSave" disabled>Сохранить</button>
    </div>
  `);

  const file = document.getElementById("upFile");
  const preview = document.getElementById("upPreview");
  const save = document.getElementById("upSave");
  let base64 = "";

  file.addEventListener("change", async ()=>{
    try{
      const f = file.files?.[0];
      if(!f){ base64=""; save.disabled=true; return; }
      base64 = await compressToDataURL(f, {maxW: isAvatar ? 600 : 1920, maxH: isAvatar ? 600 : 1080, quality:0.86});
      preview.src = base64;
      save.disabled = false;
    }catch(e){ console.log("openUpload preview error:", e.message); }
  });

  save.addEventListener("click", async ()=>{
    try{
      save.disabled = true;
      if(isAvatar) await apiPost("/api/ws/profile/upload-avatar", { image_base64: base64 });
      else await apiPost("/api/ws/profile/upload-banner", { image_base64: base64 });
      toast(isAvatar ? "Аватарка обновлена" : "Баннер обновлён");
      modalClose();
      openTab(state.tab);
    }catch(e){
      console.log("openUpload save error:", e.message);
      save.disabled = false;
    }
  });
}
async function clearBanner(){ try{ await apiPost("/api/ws/profile/clear-banner", {}); toast("Баннер очищен"); openTab(state.tab); }catch(e){ console.log("clearBanner error:", e.message); } }

    <div class="field">

      <button class="btn ghost" type="button" onclick="modalClose()">Отмена</button>
      <button class="btn primary" type="button" id="passSave">Сохранить</button>
    </div>
  `);

  document.getElementById("passSave").addEventListener("click", async ()=>{
    const oldp = String(document.getElementById("oldPass").value || "");
    const newp = String(document.getElementById("newPass").value || "");

      await apiPost("/api/ws/profile/change-password", { old_password: oldp, new_password: newp });

      modalClose();

  });
}
