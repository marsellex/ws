<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Script — Рейтинг</title>

  <link rel="icon" href="./ws_logo.ico" type="image/x-icon" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font: "Inter", sans-serif;

      --bg-body: #070b14;
      --bg-body-2: #0a1020;
      --bg-card: rgba(15, 22, 38, 0.82);
      --bg-card-2: rgba(18, 28, 48, 0.75);
      --bg-card-3: rgba(26, 38, 64, 0.7);

      --border: rgba(255,255,255,0.08);
      --border-soft: rgba(255,255,255,0.05);
      --border-strong: rgba(255,255,255,0.14);

      --text: #f5f7ff;
      --text-secondary: #b6c0d9;
      --text-muted: #7f8aa5;

      --pink: #ff4fd8;
      --pink-soft: rgba(255, 79, 216, 0.22);

      --cyan: #31d9ff;
      --cyan-soft: rgba(49, 217, 255, 0.22);

      --violet: #8868ff;
      --violet-soft: rgba(136, 104, 255, 0.22);

      --green: #41f1a1;
      --green-soft: rgba(65, 241, 161, 0.18);

      --gold: #ffcf4a;
      --gold-soft: rgba(255, 207, 74, 0.18);

      --danger: #ff6b87;

      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --shadow-lg: 0 18px 48px rgba(0,0,0,0.5);
      --shadow-soft: 0 8px 24px rgba(0,0,0,0.22);

      --radius-sm: 12px;
      --radius: 20px;
      --radius-lg: 28px;
    }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at 15% 20%, rgba(49, 217, 255, 0.10), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(255, 79, 216, 0.10), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(136, 104, 255, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg-body), var(--bg-body-2));
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.6), transparent 85%);
    }

    body::after {
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), transparent 40%);
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1600px;
      margin: 0 auto;
      padding: 26px;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .topbar-logo {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 30% 30%, rgba(49,217,255,0.35), transparent 55%),
        linear-gradient(135deg, rgba(49,217,255,0.16), rgba(255,79,216,0.12));
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
      color: var(--cyan);
      box-shadow: inset 0 0 20px rgba(255,255,255,0.03);
      flex-shrink: 0;
    }

    .topbar-text {
      min-width: 0;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(49,217,255,0.08);
      border: 1px solid rgba(49,217,255,0.14);
      color: var(--cyan);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .page-title {
      font-size: clamp(28px, 3vw, 44px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .page-subtitle {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.5;
      max-width: 820px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mini-stat {
      min-width: 170px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--bg-card-2);
      border: 1px solid var(--border-soft);
    }

    .mini-stat-label {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 7px;
    }

    .mini-stat-value {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .tabs-wrap {
      padding: 12px;
      border-radius: var(--radius-lg);
      margin-bottom: 22px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .tab-btn {
      position: relative;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      color: var(--text);
      border-radius: 22px;
      padding: 16px 14px;
      cursor: pointer;
      transition: 0.25s ease;
      min-height: 92px;
      overflow: hidden;
    }

    .tab-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.14);
      box-shadow: var(--shadow-soft);
    }

    .tab-btn.active {
      border-color: rgba(49, 217, 255, 0.34);
      box-shadow:
        0 0 0 1px rgba(49, 217, 255, 0.14),
        0 12px 28px rgba(0,0,0,0.24),
        inset 0 0 28px rgba(49, 217, 255, 0.08);
      background:
        radial-gradient(circle at top right, rgba(49,217,255,0.12), transparent 40%),
        linear-gradient(180deg, rgba(49,217,255,0.08), rgba(255,255,255,0.02));
    }

    .tab-btn.disabled {
      opacity: 0.55;
    }

    .tab-inner {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .tab-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
    }

    .tab-text {
      min-width: 0;
    }

    .tab-title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.15;
    }

    .tab-desc {
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .tab-btn.active .tab-title {
      color: var(--cyan);
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1.15fr 2fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .panel-subtitle {
      margin-top: 6px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.45;
    }

    .panel-badge {
      flex-shrink: 0;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .podium {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      align-items: end;
      min-height: 450px;
    }

    .podium-card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 18px 16px 20px;
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        rgba(15, 22, 38, 0.82);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 280px;
    }

    .podium-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top center, rgba(255,255,255,0.07), transparent 45%);
      pointer-events: none;
    }

    .podium-card.first {
      min-height: 390px;
      border-color: rgba(255, 207, 74, 0.30);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35), inset 0 0 28px rgba(255, 207, 74, 0.06);
    }

    .podium-card.second {
      min-height: 330px;
      border-color: rgba(49, 217, 255, 0.22);
    }

    .podium-card.third {
      min-height: 300px;
      border-color: rgba(255, 79, 216, 0.20);
    }

    .podium-place {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 900;
      color: #0c0f15;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.18), 0 6px 16px rgba(0,0,0,0.25);
    }

    .podium-card.first .podium-place {
      background: linear-gradient(180deg, #ffe38c, #ffcf4a);
    }

    .podium-card.second .podium-place {
      background: linear-gradient(180deg, #95efff, #31d9ff);
    }

    .podium-card.third .podium-place {
      background: linear-gradient(180deg, #ff9aea, #ff4fd8);
    }

    .avatar {
      width: 74px;
      height: 74px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 26px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.16), transparent 40%),
        linear-gradient(135deg, rgba(49,217,255,0.18), rgba(136,104,255,0.18));
    }

    .podium-card.first .avatar {
      box-shadow: inset 0 0 24px rgba(255, 207, 74, 0.08);
    }

    .podium-card.second .avatar {
      box-shadow: inset 0 0 24px rgba(49, 217, 255, 0.08);
    }

    .podium-card.third .avatar {
      box-shadow: inset 0 0 24px rgba(255, 79, 216, 0.08);
    }

    .player-login {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.15;
      word-break: break-word;
    }

    .nick-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 700;
      width: fit-content;
      max-width: 100%;
    }

    .nick-chip span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .podium-balance {
      margin-top: 16px;
      font-size: 15px;
      color: var(--text-secondary);
    }

    .podium-balance strong {
      display: block;
      font-size: 28px;
      line-height: 1.05;
      font-weight: 900;
      color: var(--text);
      margin-top: 6px;
      letter-spacing: -0.03em;
    }

    .podium-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .stat-mini {
      padding: 11px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .stat-mini-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .stat-mini-value {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }

    .list-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .list-header {
      display: grid;
      grid-template-columns: 70px minmax(240px, 1.35fr) minmax(220px, 1.1fr) minmax(170px, .9fr) minmax(220px, 1.1fr);
      gap: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-soft);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .player-row {
      display: grid;
      grid-template-columns: 70px minmax(240px, 1.35fr) minmax(220px, 1.1fr) minmax(170px, .9fr) minmax(220px, 1.1fr);
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      transition: 0.25s ease;
    }

    .player-row:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.12);
      box-shadow: var(--shadow-soft);
    }

    .player-row.current-user {
      border-color: rgba(49,217,255,0.25);
      background:
        radial-gradient(circle at left center, rgba(49,217,255,0.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018));
      box-shadow: inset 0 0 26px rgba(49,217,255,0.06), var(--shadow-soft);
    }

    .place-badge {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 900;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
    }

    .identity {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .identity-avatar {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 900;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.15), transparent 40%),
        linear-gradient(135deg, rgba(49,217,255,0.16), rgba(255,79,216,0.14));
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .identity-text {
      min-width: 0;
    }

    .identity-login {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.2;
      word-break: break-word;
    }

    .identity-sub {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .nick-pill {
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 700;
      max-width: 100%;
    }

    .identity-sep {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.12);
    }

    .identity-note {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
    }

    .metric-box {
      min-width: 0;
    }

    .metric-label {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .metric-sub {
      margin-top: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.35;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      width: fit-content;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text-secondary);
    }

    .status-chip.me {
      color: var(--cyan);
      border-color: rgba(49,217,255,0.18);
      background: rgba(49,217,255,0.08);
    }

    .under-dev {
      position: relative;
      min-height: 760px;
      overflow: hidden;
    }

    .under-dev-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      text-align: center;
      z-index: 2;
    }

    .under-dev-card {
      max-width: 540px;
      padding: 34px 28px;
      border-radius: 30px;
      background:
        radial-gradient(circle at top center, rgba(255,79,216,0.12), transparent 45%),
        linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: var(--shadow-lg);
    }

    .under-dev-icon {
      width: 74px;
      height: 74px;
      object-fit: contain;
      margin-bottom: 18px;
      filter: drop-shadow(0 8px 22px rgba(0,0,0,0.35));
    }

    .under-dev-title {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .under-dev-text {
      margin-top: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 15px;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
    }

    .empty-state {
      padding: 28px;
      border-radius: 24px;
      border: 1px dashed rgba(255,255,255,0.12);
      color: var(--text-secondary);
      text-align: center;
      background: rgba(255,255,255,0.02);
    }

    @media (max-width: 1280px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 1100px) {
      .tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .list-header,
      .player-row {
        grid-template-columns: 70px 1.25fr 1fr 1fr;
      }

      .hide-md {
        display: none;
      }
    }

    @media (max-width: 820px) {
      .page {
        padding: 16px;
      }

      .topbar {
        padding: 16px;
      }

      .topbar,
      .topbar-left,
      .topbar-right {
        flex-direction: column;
        align-items: stretch;
      }

      .tabs {
        grid-template-columns: 1fr;
      }

      .podium {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .podium-card,
      .podium-card.first,
      .podium-card.second,
      .podium-card.third {
        min-height: auto;
      }

      .list-header {
        display: none;
      }

      .player-row {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .identity-sep {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar glass">
      <div class="topbar-left">
        <div class="topbar-logo">WS</div>

        <div class="topbar-text">
          <div class="kicker">Рейтинг игроков</div>
          <h1 class="page-title">Лидерборд активности World Script</h1>
          <p class="page-subtitle">
            Отдельная тестовая страница под рейтинг игроков. Здесь есть вкладки активности,
            выделенный топ-3 подиум, общий список игроков и заглушка для раздела контрактов.
          </p>
        </div>
      </div>

      <div class="topbar-right">
        <div class="mini-stat glass">
          <div class="mini-stat-label">Активная вкладка</div>
          <div class="mini-stat-value" id="activeTabLabel">Общая активность</div>
        </div>

        <div class="mini-stat glass">
          <div class="mini-stat-label">Игроков в списке</div>
          <div class="mini-stat-value" id="playersCount">0</div>
        </div>
      </div>
    </header>

    <section class="tabs-wrap glass">
      <div class="tabs" id="tabs"></div>
    </section>

    <div id="ratingContent"></div>
  </div>

  <script>
    const currentUserLogin = "MarselLex";

    const tabConfig = {
      all: {
        key: "all",
        title: "Общая активность",
        desc: "Общий рейтинг игроков по суммарной активности и балансу",
        icon: "./png-to-rating/all_active.png",
        badge: "Главная вкладка"
      },
      roulette: {
        key: "roulette",
        title: "Рулетка",
        desc: "Топ самых активных игроков по прокруткам рулетки",
        icon: "./png-to-rating/ruletka_active.png",

    function formatNumber(value) {
      if (value === undefined || value === null) return "0";
      return new Intl.NumberFormat("ru-RU").format(value);

    function getInitials(text) {
      if (!text) return "WS";
      return text
        .split(/[\s_]+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(part => part[0]?.toUpperCase() || "")
        .join("") || text.slice(0, 2).toUpperCase();
    }

    function isCurrentUser(player) {
      return String(player.login).toLowerCase() === String(currentUserLogin).toLowerCase();
    }

    function renderTabs() {
      const tabsEl = document.getElementById("tabs");
      tabsEl.innerHTML = Object.values(tabConfig).map(tab => {
        const isActive = activeTab === tab.key;
        return `
          <button class="tab-btn ${isActive ? "active" : ""} ${tab.disabled ? "disabled" : ""}"
                  ${tab.disabled ? "" : `onclick="switchTab('${tab.key}')"`}>
            <div class="tab-inner">
              <img class="tab-icon" src="${tab.icon}" alt="${tab.title}">
              <div class="tab-text">
                <div class="tab-title">${tab.title}</div>
                <div class="tab-desc">${tab.desc}</div>
              </div>
            </div>
          </button>
        `;
      }).join("");
    }

    function switchTab(tabKey) {
      activeTab = tabKey;
      renderTabs();
      renderActiveTab();
    }

      const content = document.getElementById("ratingContent");

    function renderPodiumCard(player, place, className, tabKey) {

            <div class="player-login">Нет данных</div>

            <div class="podium-balance">Статистика <strong>—</strong></div>
          </div>
        `;
      }

      const stats = getPodiumStats(player, tabKey);

      return `
        <div class="podium-card ${className} ${isCurrentUser(player) ? "current-user" : ""}">
          <div class="podium-place">${place}</div>
          <div class="avatar">${getInitials(player.login)}</div>

          <div class="player-login">${player.login}</div>

          <div class="nick-chip">
            <span>Ник:</span>
            <span>${player.nickname || "Не указан"}</span>
          </div>

          <div class="podium-balance">
            ${stats.mainLabel}
            <strong>${stats.mainValue}</strong>
          </div>

          <div class="podium-stats">
            <div class="stat-mini">
              <div class="stat-mini-label">${stats.secondLabel}</div>
              <div class="stat-mini-value">${stats.secondValue}</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-label">${stats.thirdLabel}</div>
              <div class="stat-mini-value">${stats.thirdValue}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPlayerRow(player, place, tabKey) {
      const rowData = getRowData(player, tabKey);

      return `
        <div class="player-row ${isCurrentUser(player) ? "current-user" : ""}">
          <div>
            <div class="place-badge">${place}</div>
          </div>

          <div class="identity">
            <div class="identity-avatar">${getInitials(player.login)}</div>
            <div class="identity-text">

              <div class="identity-sub">

            <div class="metric-sub">${rowData.extraSub}</div>

      if (tabKey === "all") {
        return {
          mainLabel: "Общий баланс",
          mainValue: formatNumber(player.total_balance),

          thirdValue: formatNumber(player.to_output)

      if (tabKey === "roulette") {
        return {

          mainValue: formatNumber(player.spins),
          secondLabel: "Выиграно",
          secondValue: player.earned,
          thirdLabel: "Win rate",
          thirdValue: player.win_rate

      if (tabKey === "bonus") {
        return {
          mainLabel: "Получено бонусов",
          mainValue: formatNumber(player.claims),
          secondLabel: "Серия",
          secondValue: formatNumber(player.streak),
          thirdLabel: "Получено",
          thirdValue: player.earned
        };
      }

      if (tabKey === "chest") {
        return {
          mainLabel: "Открыто сундуков",
          mainValue: formatNumber(player.opens),
          secondLabel: "Серия",
          secondValue: formatNumber(player.streak),
          thirdLabel: "Получено",
          thirdValue: player.earned
        };
      }

      return {
        mainLabel: "Показатель",
        mainValue: "—",
        secondLabel: "Статистика",
        secondValue: "—",
        thirdLabel: "Дополнительно",
        thirdValue: "—"
      };
    }

    function getRowData(player, tabKey) {
      if (tabKey === "all") {
        return {
          identityNote: player.note || "Активный игрок",
          mainLabel: "Общий баланс",
          mainValue: formatNumber(player.total_balance),
          mainSub: `Игровой: ${formatNumber(player.game_balance)} • К выводу: ${formatNumber(player.to_output)}`,
          extraLabel: "Активность",
          extraValue: formatNumber(player.activity_points),
          extraSub: `${player.extra_1_label}: ${player.extra_1_value} • ${player.extra_2_label}: ${player.extra_2_value}`
        };
      }

      if (tabKey === "roulette") {
        return {
          identityNote: player.note || "Активен в рулетке",
          mainLabel: "Прокрутки",
          mainValue: formatNumber(player.spins),
          mainSub: `Общий баланс: ${formatNumber(player.total_balance)} • Win rate: ${player.win_rate}`,
          extraLabel: "Выиграно",
          extraValue: player.earned,
          extraSub: "Суммарный результат от рулетки"

      if (tabKey === "bonus") {
        return {
          identityNote: player.note || "Часто забирает бонус",
          mainLabel: "Бонусов получено",
          mainValue: formatNumber(player.claims),
          mainSub: `Серия: ${formatNumber(player.streak)} • Общий баланс: ${formatNumber(player.total_balance)}`,
          extraLabel: "Получено бонусами",
          extraValue: player.earned,
          extraSub: "Накопленная сумма по бонусам"

      if (tabKey === "chest") {
        return {
          identityNote: player.note || "Активен по сундукам",
          mainLabel: "Открыто сундуков",
          mainValue: formatNumber(player.opens),

          extraSub: "Накопленный результат по наградам"

      return {
        identityNote: "Участник рейтинга",
        mainLabel: "Показатель",
        mainValue: "—",
        mainSub: "—",
        extraLabel: "Дополнительно",
